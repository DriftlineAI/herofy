}

# Find thread by origin detail (for external thread ID matching)
query FindThreadByOriginDetail(
  $workspaceId: UUID!
  $customerId: UUID!
  $originDetail: String!
) @auth(level: NO_ACCESS) {
  threads(
    where: {
      workspace: { id: { eq: $workspaceId } }
      customer: { id: { eq: $customerId } }
