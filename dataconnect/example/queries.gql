    agentRun {
      id
    }
  }
}

# Get all sidekick items for a customer (for right rail clustering)
query GetSidekickItems($workspaceId: UUID!, $customerId: UUID!) @auth(level: USER_ANON) {
  # RBAC gate: caller must be a member of $workspaceId (redacted; aborts read if not).
  workspaceMembers(
    where: { workspaceId: { eq: $workspaceId }, userId: { eq_expr: "auth.uid" } }
    limit: 1
  ) @redact @check(expr: "this.size() > 0", message: "Not a member of this workspace") {
    role
  }
  # Get the customer info including health and signals
  customer(id: $customerId) {
    # RBAC: abort if this customer doesn't belong to the gated $workspaceId — prevents reading a
    # foreign workspace's customer record by pairing its customerId with a workspace you ARE in.
    workspaceId @check(expr: "this == vars.workspaceId", message: "Customer not in this workspace")
    id
    name
    slug
    tier
    arrCents
    lifecycle
    onboardingDayCurrent
    onboardingDayTotal
    # Health data for right rail
    relationshipHealth
    relationshipHealthScore
    relationshipHealthUpdatedAt
    # Latest signals for sentiment/momentum display
    signals_on_customer(
      where: { supersededAt: { isNull: true } }
      limit: 5
    ) {
      id
      kind
      state
      sentence
    }
  }

  # Get all sidekick items for this customer
  sidekickItems(
    where: {
      workspace: { id: { eq: $workspaceId } }
      customer: { id: { eq: $customerId } }
    }
    orderBy: [{ resolvedAt: ASC }, { createdAt: DESC }]
  ) {
    id
    type
    text
    question
    why
    isBlocking
    task
    step
    stepNum
    totalSteps
    resolution
    resolvedByUser {
      id
      displayName
    }
    resolvedAt
    timestampLabel
    agentRun {
      id
      agentName
      status
    }
    need {
      id
      headline
    }
    createdAt
    updatedAt
  }
}

# Get a single sidekick item by ID
query GetSidekickItem($id: UUID!) @auth(level: USER_ANON) {
  # RBAC gate: caller must belong to the sidekickItem's workspace (redacted; aborts read if not).
  _membership: sidekickItem(id: $id) @redact @check(expr: "this != null", message: "Sidekick item not found") {
    workspace {
      workspaceMembers_on_workspace(
        where: { userId: { eq_expr: "auth.uid" } }
        limit: 1
      ) @check(expr: "this.size() > 0", message: "Not a member of this workspace") {
        role
      }
    }
  }
  sidekickItem(id: $id) {
    id
    type
    text
    question
    why
    isBlocking
    task
    step
    stepNum
    totalSteps
    resolution
    resolvedByUser {
      id
      displayName
    }
    resolvedAt
    timestampLabel
    workspace {
      id
    }
    agentRun {
      id
      agentName
      status
      customer {
        id
        name
      }
    }
    need {
      id
      headline
    }
    customer {
      id
      name
      tier
      arrCents
      lifecycle
    }
    createdAt
    updatedAt
  }
}

# Get sidekick items by agent run ID (for auto-resolve on answer submission)
query GetSidekickItemsByAgentRun($agentRunId: UUID!) @auth(level: NO_ACCESS) {
  sidekickItems(
    where: {
      agentRun: { id: { eq: $agentRunId } }
    }
  ) {
    id
