# Get handbook doc with versions
query GetHandbookDoc($workspaceId: UUID!, $slug: String!) @auth(level: USER_ANON) {
  # RBAC gate: caller must be a member of $workspaceId (redacted; aborts read if not).
  workspaceMembers(
    where: { workspaceId: { eq: $workspaceId }, userId: { eq_expr: "auth.uid" } }
    limit: 1
  ) @redact @check(expr: "this.size() > 0", message: "Not a member of this workspace") {
    role
  }
  handbookDocs(
    where: {
      workspace: { id: { eq: $workspaceId } }
      slug: { eq: $slug }
    }
    limit: 1
  ) {
    id
    slug
    title
    description
    body
    blastRadius
    createdAt
    updatedAt
    # Version history
    handbookVersions_on_doc(orderBy: { editedAt: DESC }, limit: 10) {
      id
      body
      editedAt
      editedByUser {
        displayName
      }
    }
  }
}

# Get voice docs (Core, Foundations, Scenarios)
query GetVoiceDocs($workspaceId: UUID!) @auth(level: USER_ANON) {
  # RBAC gate: caller must be a member of $workspaceId (redacted; aborts read if not).
  workspaceMembers(
    where: { workspaceId: { eq: $workspaceId }, userId: { eq_expr: "auth.uid" } }
    limit: 1
  ) @redact @check(expr: "this.size() > 0", message: "Not a member of this workspace") {
    role
  }
  handbookDocs(
    where: {
      workspace: { id: { eq: $workspaceId } }
      kind: { in: [VOICE_CORE, VOICE_FOUNDATION, VOICE_SCENARIO] }
    }
    orderBy: { chapterNum: ASC }
  ) {
    id
    slug
    title
    description
    body
    kind
    inheritsFrom {
      id
      slug
      title
    }
    triggerExpr
    affectsSurfaces
    pinned
    chapterNum
    usedInDraftsToday
    blastRadius
    createdAt
    updatedAt
  }
}

