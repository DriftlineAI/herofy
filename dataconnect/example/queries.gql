# Get customer goals (for agent context assessment)
# Note: workspaceId required for multi-tenant security even though goals are accessed via customer
query GetCustomerGoals($customerId: UUID!, $workspaceId: UUID!) @auth(level: NO_ACCESS) {
  goals(
    where: {
      customer: { id: { eq: $customerId } }
      workspace: { id: { eq: $workspaceId } }
    }
    orderBy: { sortOrder: ASC }
  ) {
    id
    text
    status
    sortOrder
    isPrimary
    createdAt
  }
}

# Get milestones linked to a specific goal
query GetMilestonesForGoal($goalId: UUID!) @auth(level: NO_ACCESS) {
  milestones(
    where: { goal: { id: { eq: $goalId } } }
    orderBy: { sortOrder: ASC }
  ) {
    id
    title
    description
    ownerSide
    targetDate
    status
    sortOrder
    goalRationale
  }
}

# Get goals with their linked milestones for a customer
query GetGoalsWithMilestones($customerId: UUID!, $workspaceId: UUID!) @auth(level: USER_ANON) {
  # RBAC gate: caller must be a member of $workspaceId (redacted; aborts read if not).
  workspaceMembers(
    where: { workspaceId: { eq: $workspaceId }, userId: { eq_expr: "auth.uid" } }
    limit: 1
  ) @redact @check(expr: "this.size() > 0", message: "Not a member of this workspace") {
    role
  }
  goals(
    where: {
      customer: { id: { eq: $customerId } }
      workspace: { id: { eq: $workspaceId } }
    }
    orderBy: [{ isPrimary: DESC }, { sortOrder: ASC }]
  ) {
    id
    text
    status
    sortOrder
    isPrimary
    source
    sourceType
    sourceDate
    createdAt
    # Get milestones linked to this goal
