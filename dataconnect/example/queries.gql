# List customers for a workspace (PUBLIC for testing - remove in production)
query GetCustomersPublic($workspaceId: UUID!) @auth(level: USER_ANON) {
  # RBAC gate: caller must be a member of $workspaceId. Redacted from the response;
  # @check aborts the read if no membership row matches auth.uid.
  workspaceMembers(
    where: { workspaceId: { eq: $workspaceId }, userId: { eq_expr: "auth.uid" } }
    limit: 1
  ) @redact @check(expr: "this.size() > 0", message: "Not a member of this workspace") {
    role
  }
  customers(
    where: { workspace: { id: { eq: $workspaceId } } }
    orderBy: { name: ASC }
  ) {
    id
    name
    slug
    oneLiner
    tier
    arrCents
    lifecycle
    daysToRenewal
    onboardingDayCurrent
    onboardingDayTotal
    renewalReadiness
    externalSource
    externalId
    rawNotes
    linkedPages
    # AI Classification
    aiClassificationGroup
    aiClassificationConfidence
    aiClassificationReasoning
    aiClassificationWhatIKnow
    aiClassificationUncertainties
    aiClassificationAt
    createdAt
    signals_on_customer(
      where: { supersededAt: { isNull: true } }
      limit: 3
    ) {
      kind
      state
      sentence
    }
  }
}

