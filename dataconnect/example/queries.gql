          name
        }
      }
    }
    need {
      id
      type
      headline
      lede
    }
    # Last 20 interactions (most recent first for context)
    interactions_on_thread(orderBy: { occurredAt: DESC }, limit: 20) {
      id
      channel
      direction
      senderName
      occurredAt
      subject
      bodyEncrypted
    }
  }
}

# ============================================================================
# CONVERSATIONS (NEED-CENTRIC)
# ============================================================================

# Get needs with threads for the Conversations page (Need-centric view)
# Returns needs sorted by priority with their threads underneath
# Also returns orphan threads (threads without a need) for fallback display
query GetConversationNeeds($workspaceId: UUID!) @auth(level: USER_ANON) {
  # RBAC gate: caller must be a member of $workspaceId (redacted; aborts read if not).
  workspaceMembers(
    where: { workspaceId: { eq: $workspaceId }, userId: { eq_expr: "auth.uid" } }
    limit: 1
  ) @redact @check(expr: "this.size() > 0", message: "Not a member of this workspace") {
    role
  }
  # Active needs with threads
  needs(
    where: {
      workspace: { id: { eq: $workspaceId } }
      resolvedAt: { isNull: true }
    }
    orderBy: [{ priorityRank: ASC }, { updatedAt: DESC }]
    limit: 100
  ) {
    id
    type
    status
    headline
    lede
    priorityRank
    snoozedUntil
    resolvedAt
    agentReasoning
    createdAt
    updatedAt
    customer {
      id
      name
      slug
      lifecycle
      arrCents
      tier
    }
    milestone {
      id
      title
      status
      targetDate
    }
    meeting {
      id
      title
      scheduledAt
    }
    agentRun {
      id
      status
      clarifyingQuestions
      pausedAt
    }
    needRecommendations_on_need(limit: 1, orderBy: { createdAt: DESC }) {
      primaryAction
      secondaryAction
      rationale
    }
    # All threads for this need
    threads_on_need(orderBy: { updatedAt: DESC }) {
      id
      subject
      status
      threadType
      channel
      updatedAt
      interactions_on_thread(limit: 1, orderBy: { occurredAt: DESC }) {
        id
        senderName
        summaryAi
        occurredAt
      }
    }
  }
}

# Resolved needs (for the Conversations "Resolved" filter chip). Mirrors
# GetConversationNeeds' shape but selects resolved rows, newest-resolved first.
query GetResolvedConversationNeeds($workspaceId: UUID!) @auth(level: USER_ANON) {
  # RBAC gate: caller must be a member of $workspaceId (redacted; aborts read if not).
  workspaceMembers(
    where: { workspaceId: { eq: $workspaceId }, userId: { eq_expr: "auth.uid" } }
    limit: 1
  ) @redact @check(expr: "this.size() > 0", message: "Not a member of this workspace") {
    role
  }
  needs(
    where: {
      workspace: { id: { eq: $workspaceId } }
      resolvedAt: { isNull: false }
    }
    orderBy: [{ resolvedAt: DESC }]
    limit: 50
  ) {
    id
    type
    status
    headline
    lede
    priorityRank
    snoozedUntil
    resolvedAt
    agentReasoning
    createdAt
    updatedAt
    customer {
      id
      name
      slug
      lifecycle
      arrCents
      tier
    }
    milestone {
      id
      title
      status
      targetDate
    }
    meeting {
      id
      title
      scheduledAt
    }
    agentRun {
      id
      status
      clarifyingQuestions
      pausedAt
    }
    needRecommendations_on_need(limit: 1, orderBy: { createdAt: DESC }) {
      primaryAction
      secondaryAction
      rationale
    }
    threads_on_need(orderBy: { updatedAt: DESC }) {
      id
      subject
      status
      threadType
      channel
      updatedAt
      interactions_on_thread(limit: 1, orderBy: { occurredAt: DESC }) {
