# ============================================================================
# GOAL OBSERVATIONS
# ============================================================================

# Get goal observations for a specific goal
query GetGoalObservations($goalId: UUID!) @auth(level: USER_ANON) {
  # RBAC gate: caller must belong to this record's workspace (redacted; aborts read if not).
  _membership: goal(id: $goalId) @redact @check(expr: "this != null", message: "Goal not found") {
    workspace {
      workspaceMembers_on_workspace(where: { userId: { eq_expr: "auth.uid" } }, limit: 1)
        @check(expr: "this.size() > 0", message: "Not a member of this workspace") { role }
    }
  }
  goalObservations(
    where: { goal: { id: { eq: $goalId } } }
    orderBy: { observedAt: DESC }
  ) {
    id
    text
    confidence
    sourceType
    observedAt
    fingerprint
    status
    sourceInteraction {
      id
      summaryAi
      senderName
      occurredAt
      channel
    }
    createdAt
  }
}

# Get all goal observations for a customer (across all goals)
query GetCustomerGoalObservations($customerId: UUID!, $status: ObservationStatus) @auth(level: USER_ANON) {
  # RBAC gate: caller must belong to the customer's workspace (redacted; aborts read if not).
  _membership: customer(id: $customerId) @redact @check(expr: "this != null", message: "Customer not found") {
    workspace {
      workspaceMembers_on_workspace(where: { userId: { eq_expr: "auth.uid" } }, limit: 1)
        @check(expr: "this.size() > 0", message: "Not a member of this workspace") { role }
    }
  }
  goalObservations(
    where: {
      customer: { id: { eq: $customerId } }
      status: { eq: $status }
    }
    orderBy: { observedAt: DESC }
    limit: 50
  ) {
    id
    text
    confidence
    sourceType
    observedAt
    status
    goal {
      id
      text
      status
    }
    sourceInteraction {
      id
      summaryAi
      senderName
      occurredAt
    }
  }
}

# Check if observation fingerprint already exists (deduplication)
query CheckObservationFingerprint($fingerprint: String!) @auth(level: NO_ACCESS) {
  goalObservations(
    where: { fingerprint: { eq: $fingerprint } }
    limit: 1
  ) {
    id
    status
    observedAt
  }
}

# Get goals with source attribution
query GetGoalsWithSource($customerId: UUID!) @auth(level: USER) {
  goals(
    where: { customer: { id: { eq: $customerId } } }
    orderBy: { sortOrder: ASC }
  ) {
    id
    text
    status
    source
    sourceType
    sourceDate
    sourceInteractionId
    sourceThreadId
    sortOrder
    createdAt
  }
}

