      }
    }
  }
  aiPlans(
    where: { customer: { id: { eq: $customerId } } }
    orderBy: { generatedAt: DESC }
  ) {
    id
    archetypeName
    milestoneCount
    durationLabel
    rationale
    headline
    milestones
    status
    humanEdited
    regenerationCount
    generatedAt
