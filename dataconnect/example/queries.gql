}

# ============================================================================
# THREADS & INTERACTIONS
# ============================================================================

# List threads for a workspace
query GetThreads($workspaceId: UUID!, $status: ThreadStatus) @auth(level: USER_ANON) {
  # RBAC gate: caller must be a member of $workspaceId (redacted; aborts read if not).
  workspaceMembers(
    where: { workspaceId: { eq: $workspaceId }, userId: { eq_expr: "auth.uid" } }
    limit: 1
  ) @redact @check(expr: "this.size() > 0", message: "Not a member of this workspace") {
    role
  }
  threads(
    where: {
      workspace: { id: { eq: $workspaceId } }
      status: { eq: $status }
    }
    orderBy: { updatedAt: DESC }
    limit: 50
  ) {
    id
    subject
    status
    channel
    threadType
    category
    createdAt
    updatedAt
    customer {
      id
      name
      slug
      lifecycle
    }
    need {
      id
      type
      headline
    }
    assignedUser {
      id
      displayName
    }
    # Get latest interaction for preview
    interactions_on_thread(limit: 1, orderBy: { occurredAt: DESC }) {
      id
      senderName
      direction
      summaryAi
      occurredAt
    }
  }
}

# Get quarantined threads (unknown senders awaiting review)
query GetQuarantinedThreads($workspaceId: UUID!) @auth(level: USER_ANON) {
  # RBAC gate: caller must be a member of $workspaceId (redacted; aborts read if not).
  workspaceMembers(
    where: { workspaceId: { eq: $workspaceId }, userId: { eq_expr: "auth.uid" } }
    limit: 1
  ) @redact @check(expr: "this.size() > 0", message: "Not a member of this workspace") {
    role
  }
  threads(
    where: {
      workspace: { id: { eq: $workspaceId } }
      threadType: { eq: quarantined }
      status: { eq: open }
    }
    orderBy: { createdAt: DESC }
    limit: 100
  ) {
    id
    subject
    status
    channel
    threadType
    createdAt
    updatedAt
    customer {
      id
      name
      slug
    }
    # Get latest interaction for preview
    interactions_on_thread(limit: 1, orderBy: { occurredAt: DESC }) {
      id
      senderName
      direction
      bodyEncrypted
      occurredAt
    }
  }
}

# Get thread detail with messages
query GetThread($id: UUID!) @auth(level: USER_ANON) {
  # RBAC gate: caller must belong to this record's workspace (redacted; aborts read if not).
  _membership: thread(id: $id) @redact @check(expr: "this != null", message: "Thread not found") {
    workspace {
      workspaceMembers_on_workspace(where: { userId: { eq_expr: "auth.uid" } }, limit: 1)
        @check(expr: "this.size() > 0", message: "Not a member of this workspace") { role }
    }
  }
  thread(id: $id) {
    id
    subject
    status
    channel
    threadType
    category
    aiCategorySuggestion
    originDetail
    archivedAt
    resolvedAt
    createdAt
    updatedAt
    workspace {
      id
    }
    customer {
      id
      name
      slug
      lifecycle
      arrCents
      tier
    }
    need {
      id
      type
      headline
      lede
      priorityRank
      agentReasoning
    }
    assignedUser {
      id
      displayName
      email
    }
    # All interactions (messages)
    interactions_on_thread(orderBy: { occurredAt: ASC }) {
      id
      channel
      direction
      senderName
      occurredAt
      subject
      bodyEncrypted
      summaryAi
      senderUser {
        id
        displayName
        avatarUrl
      }
    }
  }
}

# Get thread with full context for AI draft generation (PUBLIC for backend service)
# Includes thread + interactions + customer signals + commitments
query GetThreadForDraft($id: UUID!) @auth(level: NO_ACCESS) {
  thread(id: $id) {
    id
    subject
    status
    channel
    threadType
    category
    createdAt
    updatedAt
    workspace {
      id
    }
    customer {
      id
      name
      slug
      lifecycle
      tier
      oneLiner
      # Recent signals (last 30 days covered by query filter in service)
      signals_on_customer(
        where: { supersededAt: { isNull: true } }
        orderBy: { generatedAt: DESC }
        limit: 10
      ) {
        kind
        state
        sentence
        generatedAt
      }
      # Open commitments
      commitments_on_customer(
        where: { status: { eq: in_progress } }
        orderBy: { createdAt: DESC }
