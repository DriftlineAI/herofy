    where: { customerId: { eq: $customerId } }
    orderBy: { createdAt: DESC }
    limit: 1
  ) {
    id
    status
    body
    dayCurrent
    dayTotal
    salesCommitments
    technicalContext
    realityCheckConfidence
    realityCheckRisks
    notionDealId
    notionDealUrl
    createdAt
  }
}

# Get the latest handoff brief AND plans for a customer (for Brief tab)
query GetCustomerHandoffWithPlan($customerId: UUID!) @auth(level: USER_ANON) {
  # RBAC gate: caller must belong to the customer's workspace (redacted; aborts read if not).
  _membership: customer(id: $customerId) @redact @check(expr: "this != null", message: "Customer not found") {
    workspace {
      workspaceMembers_on_workspace(
        where: { userId: { eq_expr: "auth.uid" } }
        limit: 1
      ) @check(expr: "this.size() > 0", message: "Not a member of this workspace") {
        role
      }
    }
  }
  handoffBriefs(
    where: { customerId: { eq: $customerId } }
    orderBy: { createdAt: DESC }
    limit: 1
  ) {
    id
    status
    body
    dayCurrent
    dayTotal
    salesCommitments
    technicalContext
    realityCheckConfidence
    realityCheckRisks
    notionDealId
    notionDealUrl
    createdAt
    # Include open questions
    handoffOpenQuestions_on_brief {
      id
      text
      resolved
      createdAt
