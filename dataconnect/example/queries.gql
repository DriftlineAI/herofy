    # Include AI plans for this brief
    aiPlans_on_brief(orderBy: { generatedAt: DESC }) {
      id
      archetypeName
      milestoneCount
      durationLabel
      rationale
      headline
      milestones
      status
      humanEdited
      regenerationCount
      generatedAt
      approvedByUser {
