}

# Get plans directly for a customer (not via brief relationship)
# Use this when plans may be created without a handoff brief
query GetCustomerPlans($customerId: UUID!) @auth(level: USER_ANON) {
  # RBAC gate: caller must belong to the customer's workspace (redacted; aborts read if not).
