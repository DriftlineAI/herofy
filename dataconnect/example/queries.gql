# ============================================================================
# ORCHESTRATOR — AgentTask work queue (net-new, side-by-side with handoff_auto)
# ============================================================================

# Next eligible task to claim: pending + due (scheduledFor <= now), highest
# priority first, then oldest. The repository then does a guarded optimistic
# claim (ClaimAgentTask) since DataConnect has no SELECT ... FOR UPDATE SKIP LOCKED.
query GetNextPendingAgentTask($workspaceId: UUID!, $now: Timestamp!) @auth(level: NO_ACCESS) {
  agentTasks(
    where: {
      workspace: { id: { eq: $workspaceId } }
      status: { eq: pending }
      scheduledFor: { le: $now }
    }
    orderBy: [{ priority: ASC }, { createdAt: ASC }]
    limit: 1
  ) {
    id
    taskType
    triggerType
    payload
    status
    priority
    attempts
    scheduledFor
    customer {
      id
      name
    }
  }
}

query GetAgentTask($id: UUID!) @auth(level: NO_ACCESS) {
  agentTask(id: $id) {
    id
    workspace { id }
    customer { id name }
    taskType
    triggerType
    payload
    status
    priority
    attempts
    scheduledFor
    blockingNeed { id resolvedAt }
    agentRun { id status }
    result
    errorMessage
    claimedAt
    completedAt
    createdAt
  }
}

# Demo support: list waiting tasks blocked on a need (resume after HITL answer)
query GetWaitingAgentTaskForNeed($needId: UUID!) @auth(level: NO_ACCESS) {
  agentTasks(
    where: {
      status: { eq: waiting }
      blockingNeed: { id: { eq: $needId } }
    }
    limit: 1
  ) {
    id
    payload
    customer { id }
    blockingNeed { id resolvedAt }
  }
}

# Risk briefs for a customer (used by demo reset to find steps to delete, and by
# CustomerDetail to render the Risk/Save play output).
query GetRiskBriefsForCustomer($workspaceId: UUID!, $customerId: UUID!) @auth(level: NO_ACCESS) {
  riskBriefs(
    where: {
      workspace: { id: { eq: $workspaceId } }
      customer: { id: { eq: $customerId } }
    }
    orderBy: { createdAt: DESC }
  ) {
    id
    whatChanged
    evidenceText
    play
    createdAt
  }
}

# Risk briefs for a customer WITH their save-play steps nested (used by CustomerDetail's
# RiskSavePlayCard to render the full Risk/Save play output). Customer-scoped, user-authed.
query GetRiskBriefsWithSteps($customerId: UUID!) @auth(level: USER_ANON) {
  # RBAC gate: caller must belong to the customer's workspace (redacted; aborts read if not).
  _membership: customer(id: $customerId) @redact @check(expr: "this != null", message: "Customer not found") {
    workspace {
      workspaceMembers_on_workspace(where: { userId: { eq_expr: "auth.uid" } }, limit: 1)
        @check(expr: "this.size() > 0", message: "Not a member of this workspace") { role }
    }
  }
  riskBriefs(
    where: { customer: { id: { eq: $customerId } } }
    orderBy: { createdAt: DESC }
  ) {
    id
    whatChanged
    evidenceText
    play
    generatedAt
    createdAt
    riskPlaySteps_on_brief(orderBy: { sortOrder: ASC }) {
      id
      label
      rationale
      done
      notes
      sortOrder
    }
  }
}

# Needs by source event (orchestrator idempotency + demo reset verification).
query GetNeedsBySourceEvent($workspaceId: UUID!, $sourceEventId: String!) @auth(level: NO_ACCESS) {
  needs(
    where: {
      workspace: { id: { eq: $workspaceId } }
      sourceEventId: { eq: $sourceEventId }
    }
  ) {
    id
    type
    headline
    resolvedAt
  }
}

# Best-fit RISK playbook for a workspace (orchestrator risk strategist adapts it).
# Highest acceptance first, then most recently used. Additive: returns [] when the
# workspace hasn't formalized a risk play, and the strategist falls back to generating.
query GetRiskPlaybook($workspaceId: UUID!) @auth(level: NO_ACCESS) {
  playbooks(
    where: {
      workspace: { id: { eq: $workspaceId } }
      scenario: { eq: risk }
    }
    orderBy: [{ timesAccepted: DESC }, { lastUsedAt: DESC }]
    limit: 1
  ) {
    id
    name
    archetype
    fitNote
    timesUsed
    timesAccepted
    playbookMilestones_on_playbook(orderBy: { sortOrder: ASC }) {
      title
      description
      ownerSide
      sortOrder
    }
  }
}

# Risk briefs for a specific triggering event (orchestrator idempotency keyed per-event,
# not per-customer — inputsHash carries the source_event_id).
query GetRiskBriefByEvent($workspaceId: UUID!, $inputsHash: String!) @auth(level: NO_ACCESS) {
  riskBriefs(
    where: {
      workspace: { id: { eq: $workspaceId } }
      inputsHash: { eq: $inputsHash }
    }
    orderBy: { createdAt: DESC }
    limit: 1
  ) {
    id
    whatChanged
    evidenceText
    createdAt
  }
}

# Demo meetings for a customer (by demo externalEventId tag) — used by demo reset.
query GetDemoMeetings($workspaceId: UUID!, $customerId: UUID!, $externalEventId: String!) @auth(level: NO_ACCESS) {
  meetings(
    where: {
      workspace: { id: { eq: $workspaceId } }
      customer: { id: { eq: $customerId } }
      externalEventId: { eq: $externalEventId }
    }
  ) {
    id
  }
}

# All due + pending tasks across workspaces (scheduler sweep finds which workspaces to drain).
query GetDuePendingTasks($now: Timestamp!) @auth(level: NO_ACCESS) {
  agentTasks(
    where: { status: { eq: pending }, scheduledFor: { le: $now } }
    orderBy: { priority: ASC }
    limit: 200
  ) {
    id
    workspace { id }
  }
}

# ============================================================================
# HUDDLES + fan-out Needs on a thread (conversation interface contract)
# ============================================================================

# All needs anchored to a thread (fan-out: a thread can carry several needs).
query GetNeedsForThread($threadId: UUID!) @auth(level: USER_ANON) {
  # RBAC gate: caller must belong to this record's workspace (redacted; aborts read if not).
  _membership: thread(id: $threadId) @redact @check(expr: "this != null", message: "Thread not found") {
    workspace {
      workspaceMembers_on_workspace(where: { userId: { eq_expr: "auth.uid" } }, limit: 1)
        @check(expr: "this.size() > 0", message: "Not a member of this workspace") { role }
    }
  }
  needs(
    where: { thread: { id: { eq: $threadId } }, resolvedAt: { isNull: true } }
    orderBy: { priorityRank: ASC }
  ) {
    id
    type
    headline
    lede
    priorityRank
    createdAt
  }
}

# Huddles on a thread (list) with message count + anchor.
query GetThreadHuddles($threadId: UUID!) @auth(level: USER_ANON) {
  # RBAC gate: caller must belong to this record's workspace (redacted; aborts read if not).
  _membership: thread(id: $threadId) @redact @check(expr: "this != null", message: "Thread not found") {
    workspace {
      workspaceMembers_on_workspace(where: { userId: { eq_expr: "auth.uid" } }, limit: 1)
        @check(expr: "this.size() > 0", message: "Not a member of this workspace") { role }
    }
  }
  huddles(
    where: { thread: { id: { eq: $threadId } } }
    orderBy: { createdAt: DESC }
  ) {
    id
    title
    status
    anchorInteraction { id }
    createdByUser { displayName }
    createdAt
    resolvedAt
    huddleMessages_on_huddle(orderBy: { createdAt: ASC }) {
      id
      authorKind
      authorUser { displayName }
      body
      mentions
      createdAt
    }
  }
}

# One huddle with its messages (detail).
query GetHuddle($id: UUID!) @auth(level: USER_ANON) {
  # RBAC gate: caller must belong to this record's workspace (redacted; aborts read if not).
  _membership: huddle(id: $id) @redact @check(expr: "this != null", message: "Huddle not found") {
    workspace {
      workspaceMembers_on_workspace(where: { userId: { eq_expr: "auth.uid" } }, limit: 1)
        @check(expr: "this.size() > 0", message: "Not a member of this workspace") { role }
    }
  }
  huddle(id: $id) {
    id
    title
    status
    thread { id }
    anchorInteraction { id }
    createdByUser { displayName }
    createdAt
    resolvedAt
    huddleMessages_on_huddle(orderBy: { createdAt: ASC }) {
      id
      authorKind
      authorUser { id displayName }
      body
      mentions
      createdAt
    }
  }
}

# Public variant for the orchestrator worker (huddle_reply handler reads the thread + context).
query GetHuddlePublic($id: UUID!) @auth(level: NO_ACCESS) {
  huddle(id: $id) {
    id
    status
    workspace { id }
    customer { id name }
    thread { id }
    huddleMessages_on_huddle(orderBy: { createdAt: ASC }) {
      authorKind
      authorUser { displayName }
      body
      mentions
      createdAt
    }
  }
}

# ============================================================================
# SWEEP QUERIES (background signal detection)
# ============================================================================

# Active + onboarding customers for sweep evaluation
query GetCustomersForSweep($workspaceId: UUID!) @auth(level: NO_ACCESS) {
  customers(
    where: {
      workspace: { id: { eq: $workspaceId } }
      lifecycle: { in: [active, onboarding, at_risk, renewing] }
    }
    orderBy: { createdAt: ASC }
  ) {
    id
    name
    lifecycle
    arrCents
  }
}

# Most recent inbound interaction for a customer (going-dark detection)
query GetLastInboundInteraction(
  $workspaceId: UUID!
  $customerId: UUID!
) @auth(level: NO_ACCESS) {
  interactions(
    where: {
      workspace: { id: { eq: $workspaceId } }
      customer: { id: { eq: $customerId } }
      direction: { eq: customer }
    }
    orderBy: { occurredAt: DESC }
    limit: 1
  ) {
    id
    occurredAt
  }
}

# Most recent OUTBOUND interaction in a thread before a timestamp — used to pair an
# inbound reply to our last message and compute per-stakeholder response latency.
query GetLastOutboundInThreadBefore(
  $threadId: UUID!
  $before: Timestamp!
) @auth(level: NO_ACCESS) {
  interactions(
    where: {
      thread: { id: { eq: $threadId } }
      direction: { eq: us }
      occurredAt: { lt: $before }
    }
    orderBy: { occurredAt: DESC }
    limit: 1
  ) {
    id
    occurredAt
  }
}

# Inbound interactions for a customer within a time window (for trend detection)
query GetInteractionsInWindow(
  $workspaceId: UUID!
  $customerId: UUID!
  $after: Timestamp!
  $before: Timestamp!
) @auth(level: NO_ACCESS) {
  interactions(
    where: {
      workspace: { id: { eq: $workspaceId } }
      customer: { id: { eq: $customerId } }
      direction: { eq: customer }
      occurredAt: { ge: $after, le: $before }
    }
    limit: 100
  ) {
    id
    occurredAt
  }
}

# Recent sentiment signals for a customer (for trend analysis)
query GetRecentSentimentSignals(
  $workspaceId: UUID!
  $customerId: UUID!
  $after: Timestamp!
) @auth(level: NO_ACCESS) {
  signals(
    where: {
      workspace: { id: { eq: $workspaceId } }
      customer: { id: { eq: $customerId } }
      kind: { eq: sentiment }
      supersededAt: { isNull: true }
      generatedAt: { ge: $after }
    }
    orderBy: { generatedAt: ASC }
    limit: 20
  ) {
    id
    state
    sentence
    generatedAt
  }
}

# Check for an existing active signal of a given kind (sweep dedup)
query GetActiveSignalByKind(
  $workspaceId: UUID!
  $customerId: UUID!
  $kind: SignalKind!
) @auth(level: NO_ACCESS) {
  signals(
    where: {
      workspace: { id: { eq: $workspaceId } }
      customer: { id: { eq: $customerId } }
      kind: { eq: $kind }
      supersededAt: { isNull: true }
    }
    orderBy: { generatedAt: DESC }
    limit: 1
  ) {
    id
    state
    generatedAt
  }
}

# Active (non-terminal) tasks for a customer — used by signal router to prevent
# duplicate task creation when a signal fires for an already-queued account.
query GetActiveTasksForCustomer(
  $workspaceId: UUID!
  $customerId: UUID!
) @auth(level: NO_ACCESS) {
  agentTasks(
    where: {
      workspace: { id: { eq: $workspaceId } }
      customer: { id: { eq: $customerId } }
      status: { in: [pending, in_progress, waiting] }
    }
    orderBy: { priority: ASC }
    limit: 1
  ) {
    id
    status
    priority
    taskType
  }
}

# Risk context for the inbound support lane's deterministic risk_analyst:
# active signals + lifecycle/renewal + open risk-typed needs, in one read.
query GetCustomerRiskContext($workspaceId: UUID!, $customerId: UUID!) @auth(level: NO_ACCESS) {
  customer(id: $customerId) {
    id
    name
    lifecycle
    daysToRenewal
    renewalReadiness
    signals_on_customer(where: { supersededAt: { isNull: true } }) {
      kind
      state
      sentence
    }
  }
  needs(
    where: {
      workspace: { id: { eq: $workspaceId } }
      customer: { id: { eq: $customerId } }
      resolvedAt: { isNull: true }
      type: { in: [renewal_at_risk, going_dark, escalation, frustrated_signal, champion_departed] }
    }
    limit: 5
  ) {
    id
    type
    headline
  }
}

# Pipeline console: list recent AgentTasks for a workspace (newest first), for the queue viewer.
query ListAgentTasksForWorkspace($workspaceId: UUID!) @auth(level: NO_ACCESS) {
  agentTasks(
    where: { workspace: { id: { eq: $workspaceId } } }
    orderBy: { createdAt: DESC }
    limit: 100
  ) {
    id
    customer { id name }
    taskType
    triggerType
    status
    priority
    scheduledFor
    attempts
    createdAt
    completedAt
    agentRun { id status }
  }
}

# ============================================================================
# RENEWALS — pipeline list + adaptive workspace
# ============================================================================

# Screen 1 — Renewals pipeline. Every customer with a renewal date, plus the
# renewal profile (posture, target ARR), goal-progress vectors for the mini
# bars, current signals, and stakeholders (for champion-departure context).
query GetRenewalsPipeline($workspaceId: UUID!) @auth(level: USER_ANON) {
  # RBAC gate: caller must be a member of $workspaceId (redacted; aborts read if not).
  workspaceMembers(
    where: { workspaceId: { eq: $workspaceId }, userId: { eq_expr: "auth.uid" } }
    limit: 1
  ) @redact @check(expr: "this.size() > 0", message: "Not a member of this workspace") {
    role
  }
  customers(
    where: {
      workspace: { id: { eq: $workspaceId } }
      daysToRenewal: { isNull: false }
    }
    orderBy: { daysToRenewal: ASC }
  ) {
    id
    name
    slug
    arrCents
    daysToRenewal
    lifecycle
    renewalReadiness
    valueRealizationText
    clientSignedDate
    renewalProfiles_on_customer(orderBy: { updatedAt: DESC }, limit: 1) {
      id
      posture
      postureReason
      narrativeLede
      targetArrCents
      expansionPipeCents
    }
    goals_on_customer(
      where: { status: { eq: active } }
      orderBy: [{ isPrimary: DESC }, { sortOrder: ASC }]
      limit: 3
    ) {
      id
      text
      isPrimary
      progressVectors_on_goal(orderBy: { category: ASC }, limit: 1) {
        id
        category
        progress
        currentState
        description
      }
    }
    signals_on_customer(where: { supersededAt: { isNull: true } }, limit: 5) {
      kind
      state
      sentence
    }
    stakeholders_on_customer {
      id
      status
      isChampion
    }
  }
}

# Screen 2 — Renewal workspace detail for one account.
query GetRenewalWorkspace($customerId: UUID!) @auth(level: USER_ANON) {
  # RBAC gate: caller must belong to the customer's workspace (redacted; aborts read if not).
  _membership: customer(id: $customerId) @redact @check(expr: "this != null", message: "Customer not found") {
    workspace {
      workspaceMembers_on_workspace(where: { userId: { eq_expr: "auth.uid" } }, limit: 1)
        @check(expr: "this.size() > 0", message: "Not a member of this workspace") { role }
    }
  }
  customer(id: $customerId) {
    id
    name
    slug
    oneLiner
    tier
    arrCents
    daysToRenewal
    lifecycle
    renewalReadiness
    valueRealizationText
    clientSignedDate
    relationshipHealth
    relationshipHealthScore
    renewalProfiles_on_customer(orderBy: { updatedAt: DESC }, limit: 1) {
      id
      posture
      postureReason
      narrativeLede
      targetArrCents
      expansionPipeCents
      renewalType
      autoRenew
      termNote
      lastPriceChangeNote
      postureSetBy
      postureDerivedAt
      renewalPlays_on_profile(orderBy: { sortOrder: ASC }) {
        id
        kind
        posture
        title
        description
        basis
        valueAmountCents
        valueLabel
        isPrimary
        sortOrder
      }
      renewalRiskItems_on_profile(orderBy: { sortOrder: ASC }) {
        id
        title
        description
        severity
        mitigation
        sortOrder
      }
    }
    goals_on_customer(
      where: { status: { eq: active } }
      orderBy: [{ isPrimary: DESC }, { sortOrder: ASC }]
    ) {
      id
      text
      isPrimary
      progressVectors_on_goal(orderBy: { category: ASC }) {
        id
        category
        description
        currentState
        progress
        baselineProgress
        targetProgress
        targetLabel
        unlocks
        assessmentReason
      }
    }
    stakeholders_on_customer {
      id
      name
      role
      status
      isChampion
      renewalHealth
      sentimentNote
      lastInteractionAt
    }
    signals_on_customer(where: { supersededAt: { isNull: true } }, limit: 10) {
      id
      kind
      state
      sentence
      evidenceText
    }
  }
}

# Renewals seed helper — PUBLIC read of the IDs the seed needs to attach
# progress vectors and update stakeholders (the USER-level GetCustomer can't
# be called from the unauthenticated seed script).
query GetCustomerSeedRefs($customerId: UUID!) @auth(level: NO_ACCESS) {
  customer(id: $customerId) {
    id
    goals_on_customer(orderBy: { sortOrder: ASC }) {
      id
      text
    }
    stakeholders_on_customer {
      id
      name
    }
    progressVectors_on_customer {
      id
    }
  }
}

# ============================================================================
# METRIC SNAPSHOTS (time-series substrate — see docs/plans/SIGNAL_AGGREGATION.md)
# ============================================================================

# Oldest snapshots in a workspace captured before a cutoff — used by the retention
# job to downsample raw rows older than the retention window to daily.
query GetMetricSnapshotsBefore(
  $workspaceId: UUID!
  $before: Timestamp!
  $limit: Int!
) @auth(level: NO_ACCESS) {
  metricSnapshots(
    where: {
      workspace: { id: { eq: $workspaceId } }
      capturedAt: { lt: $before }
    }
    orderBy: { capturedAt: ASC }
    limit: $limit
  ) {
    id
    customer {
      id
    }
    stakeholder {
      id
    }
    metric
    capturedAt
  }
}

# Most recent snapshot for a customer/metric (fast "prior value" read).
query GetLatestMetricSnapshot(
  $workspaceId: UUID!
  $customerId: UUID!
  $metric: String!
) @auth(level: NO_ACCESS) {
  metricSnapshots(
    where: {
      workspace: { id: { eq: $workspaceId } }
      customer: { id: { eq: $customerId } }
      metric: { eq: $metric }
    }
    orderBy: { capturedAt: DESC }
    limit: 1
  ) {
    id
    metric
    value
    state
    prevValue
    trigger
    inputs
    capturedAt
  }
}

# Recent snapshots for a single stakeholder/metric since a timestamp — used for
# per-stakeholder responsiveness (response_latency) baselines. Oldest-first.
query GetRecentStakeholderMetricSnapshots(
  $workspaceId: UUID!
  $stakeholderId: UUID!
  $metric: String!
  $since: Timestamp!
) @auth(level: NO_ACCESS) {
  metricSnapshots(
    where: {
      workspace: { id: { eq: $workspaceId } }
      stakeholder: { id: { eq: $stakeholderId } }
      metric: { eq: $metric }
      capturedAt: { ge: $since }
    }
    orderBy: { capturedAt: ASC }
    limit: 200
  ) {
    id
    metric
    value
    state
    capturedAt
  }
}

# Recent snapshots for a customer/metric since a timestamp (sparkline / trend).
# Oldest-first; limit 200 covers ~90d of append-on-change + daily heartbeat.
query GetRecentMetricSnapshots(
  $workspaceId: UUID!
  $customerId: UUID!
  $metric: String!
  $since: Timestamp!
) @auth(level: NO_ACCESS) {
  metricSnapshots(
    where: {
      workspace: { id: { eq: $workspaceId } }
      customer: { id: { eq: $customerId } }
      metric: { eq: $metric }
      capturedAt: { ge: $since }
    }
    orderBy: { capturedAt: ASC }
    limit: 200
  ) {
    id
    metric
    value
    state
    prevValue
    trigger
    inputs
    capturedAt
  }
}
