# ============================================================================
# AGENT MEMORY QUERIES
# ============================================================================

# Get past AI plans for a workspace (for agent memory/learning)
query GetPastPlans($workspaceId: UUID!, $customerId: UUID, $limit: Int = 10) @auth(level: NO_ACCESS) {
  aiPlans(
    where: {
      _and: [
        { workspace: { id: { eq: $workspaceId } } }
        { _or: [
          { customer: { id: { isNull: true } } }
          { customer: { id: { eq: $customerId } } }
        ]}
      ]
    }
    orderBy: { createdAt: DESC }
    limit: $limit
  ) {
    id
    headline
    status
    milestoneCount
    durationLabel
    archetypeName
    humanEdited
    createdAt
    approvedAt
    customer {
      id
      name
      tier
      arrCents
    }
  }
}

# Get pending AI plans for a workspace (for HITL approval UI)
query GetPendingPlans($workspaceId: UUID!) @auth(level: NO_ACCESS) {
  aiPlans(
    where: {
      workspace: { id: { eq: $workspaceId } }
      status: { eq: pending_approval }
    }
    orderBy: { createdAt: DESC }
  ) {
    id
    headline
    status
    milestoneCount
    durationLabel
    archetypeName
    humanEdited
    createdAt
    customer {
      id
      name
      tier
      arrCents
    }
  }
}

# Get similar customers by tier and ARR range (for agent memory)
query GetSimilarCustomers($workspaceId: UUID!, $tier: String, $arrLow: Int64, $arrHigh: Int64, $limit: Int = 5) @auth(level: NO_ACCESS) {
  customers(
    where: {
      _and: [
        { workspace: { id: { eq: $workspaceId } } }
        { arrCents: { ge: $arrLow } }
        { arrCents: { le: $arrHigh } }
      ]
    }
    orderBy: { createdAt: DESC }
    limit: $limit
  ) {
    id
    name
    tier
    arrCents
    lifecycle
  }
}

# Get completed agent runs with HITL patterns (for agent learning)
query GetHitlPatterns($workspaceId: UUID!, $agentName: String, $limit: Int = 20) @auth(level: NO_ACCESS) {
  agentRuns(
    where: {
      _and: [
        { workspace: { id: { eq: $workspaceId } } }
        { status: { eq: completed } }
        { pauseReason: { isNull: false } }
        { _or: [
          { agentName: { isNull: true } }
          { agentName: { eq: $agentName } }
        ]}
      ]
    }
    orderBy: { createdAt: DESC }
    limit: $limit
  ) {
    id
    agentName
    pauseReason
    clarifyingQuestions
    resumeAnswers
    createdAt
  }
}

