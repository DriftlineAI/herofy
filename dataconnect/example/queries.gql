# ============================================================================
# DRAFT RESPONSES
# ============================================================================

# Get draft response for a thread
query GetDraftResponse($threadId: UUID!) @auth(level: USER_ANON) {
  # RBAC gate: caller must belong to this record's workspace (redacted; aborts read if not).
  _membership: thread(id: $threadId) @redact @check(expr: "this != null", message: "Thread not found") {
    workspace {
      workspaceMembers_on_workspace(where: { userId: { eq_expr: "auth.uid" } }, limit: 1)
        @check(expr: "this.size() > 0", message: "Not a member of this workspace") { role }
    }
  }
  draftResponses(
    where: {
      thread: { id: { eq: $threadId } }
      status: { eq: pending_review }
    }
    limit: 1
    orderBy: { generatedAt: DESC }
  ) {
    id
    subject
    body
    citations
    status
    editedBody
    generatedAt
    createdAt
    approvedByUser {
      displayName
    }
    approvedAt
    sentAt
    surfacedInNeed {
      id
      type
      headline
    }
  }
}

# Latest pending draft for a customer → its thread. Backend-only: lets the send action find the
# outreach thread by customer (the worker HITL resume has the customer, not a thread).
query GetPendingDraftForCustomer($workspaceId: UUID!, $customerId: UUID!) @auth(level: NO_ACCESS) {
  draftResponses(
    where: {
      workspace: { id: { eq: $workspaceId } }
      customer: { id: { eq: $customerId } }
      status: { eq: pending_review }
    }
    orderBy: { generatedAt: DESC }
    limit: 1
  ) {
    id
    thread {
      id
    }
  }
}

# A surfaced save Need → its agent run + the run's blocking decision (the approve/counter/hold
# sidekick_question). Backend-only: lets the send action detect & close an open HITL decision when
# the CSM sends the outreach from the conversation instead of the Sidekick screen.
query GetSaveDecisionForNeed($needId: UUID!) @auth(level: NO_ACCESS) {
  need(id: $needId) {
    id
    agentRun {
      id
      status
      blockingNeed {
        id
        type
        resolvedAt
      }
    }
  }
}

