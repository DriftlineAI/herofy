# Herofy Queries
# These queries power the frontend application

# ============================================================================
# USER & WORKSPACE
# ============================================================================

# Get current user by Firebase Auth UID
# TODO: Change back to @auth(level: USER) once auth emulator is configured
query GetCurrentUser @auth(level: USER_ANON) {
  user(key: { id_expr: "auth.uid" }) {
    id
    email
    displayName
    avatarUrl
    createdAt
    # Get workspaces this user belongs to
    workspaceMembers_on_user {
      role
      joinedAt
      hasCompletedSetup
      workspace {
        id
        name
        slug
        setupCompleted
      }
    }
  }
}

# Get user by explicit ID (for use when auth.uid context isn't available)
# This is needed when using real Firebase Auth with DataConnect emulator
# Using users() with where clause instead of user(key:) for better compatibility
query GetUserById($userId: String!) @auth(level: USER_ANON) {
  users(where: { id: { eq: $userId } }, limit: 1) {
    id
    email
    displayName
    avatarUrl
    createdAt
    workspaceMembers_on_user {
      role
      joinedAt
      hasCompletedSetup
      workspace {
        id
        name
        slug
        setupCompleted
      }
    }
  }
}

# Check if user is a member of a workspace (for backend auth middleware)
query CheckWorkspaceMembership($workspaceId: UUID!, $userId: String!) @auth(level: NO_ACCESS) {
  workspaceMembers(
    where: { workspaceId: { eq: $workspaceId }, userId: { eq: $userId } }
    limit: 1
  ) {
    role
  }
}

# Get workspace by ID with member count
query GetWorkspace($id: UUID!) @auth(level: USER_ANON) {
  # RBAC gate: caller must be a member of this workspace (redacted; aborts read if not).
  _membership: workspace(id: $id) @redact @check(expr: "this != null", message: "Workspace not found") {
    workspaceMembers_on_workspace(where: { userId: { eq_expr: "auth.uid" } }, limit: 1)
      @check(expr: "this.size() > 0", message: "Not a member of this workspace") { role }
  }
  workspace(id: $id) {
    id
    name
    slug
    domain
    valueProp
    createdAt
    workspaceMembers_on_workspace {
      user {
        id
        email
        displayName
        avatarUrl
      }
      role
      joinedAt
    }
  }
}

# Get workspace by ID (PUBLIC for backend enrichment service)
query GetWorkspacePublic($id: UUID!) @auth(level: NO_ACCESS) {
  workspace(id: $id) {
    id
    name
    slug
    domain
    valueProp
  }
}

# Find workspace by email domain (for team matching on signup)
query GetWorkspaceByDomain($domain: String!) @auth(level: USER) {
  workspaces(where: { domain: { eq: $domain } }, limit: 1) {
    id
    name
    slug
    domain
    setupCompleted
    # Get ALL members to check if current user is already a member
    workspaceMembers_on_workspace {
      role
      hasCompletedSetup
      user {
        id
        displayName
        email
      }
    }
  }
}

# Get pending join requests for a workspace (for admins)
query GetPendingJoinRequests($workspaceId: UUID!) @auth(level: USER_ANON) {
  # RBAC gate: caller must be a member of $workspaceId (redacted; aborts read if not).
  workspaceMembers(
    where: { workspaceId: { eq: $workspaceId }, userId: { eq_expr: "auth.uid" } }
    limit: 1
  ) @redact @check(expr: "this.size() > 0", message: "Not a member of this workspace") {
    role
  }
  workspaceJoinRequests(
    where: { workspaceId: { eq: $workspaceId }, status: { eq: pending } }
    orderBy: [{ createdAt: DESC }]
  ) {
    id
    userId
    userEmail
    status
    createdAt
  }
}

# Get join request status for current user
query GetMyJoinRequest($workspaceId: UUID!) @auth(level: USER_ANON) {
  # RBAC gate: caller must be a member of $workspaceId (redacted; aborts read if not).
  workspaceMembers(
    where: { workspaceId: { eq: $workspaceId }, userId: { eq_expr: "auth.uid" } }
    limit: 1
  ) @redact @check(expr: "this.size() > 0", message: "Not a member of this workspace") {
    role
  }
  workspaceJoinRequests(
    where: { workspaceId: { eq: $workspaceId }, userId: { eq_expr: "auth.uid" } }
    limit: 1
  ) {
    id
    status
    createdAt
    reviewedAt
  }
}

# Get workspace member role for current user
query GetWorkspaceMemberRole($workspaceId: UUID!) @auth(level: USER_ANON) {
  workspaceMembers(
    where: { workspaceId: { eq: $workspaceId }, userId: { eq_expr: "auth.uid" } }
    limit: 1
  ) {
    role
    joinedAt
    user {
      id
      email
      displayName
    }
    workspace {
      id
      name
      slug
    }
  }
}

# Get all workspace members (for team management)
query GetWorkspaceMembers($workspaceId: UUID!) @auth(level: USER) {
  workspaceMembers(
    where: { workspaceId: { eq: $workspaceId } }
    orderBy: [{ joinedAt: ASC }]
  ) {
    role
    joinedAt
    hasCompletedSetup
    user {
      id
      email
      displayName
      avatarUrl
    }
  }
}

# Get workspace member setup status (for checking if setup is complete)
query GetWorkspaceMemberSetupStatus($workspaceId: UUID!, $userId: String!) @auth(level: USER) {
  workspaceMembers(
    where: { workspaceId: { eq: $workspaceId }, userId: { eq: $userId } }
    limit: 1
  ) {
    hasCompletedSetup
  }
}

# ============================================================================
# WORKSPACE INVITATIONS
# ============================================================================

# Get pending invitations for a workspace (admin view)
query GetPendingInvitations($workspaceId: UUID!) @auth(level: USER) {
  workspaceInvitations(
    where: { workspaceId: { eq: $workspaceId }, status: { eq: pending } }
    orderBy: [{ createdAt: DESC }]
  ) {
    id
    email
    role
    token
    expiresAt
    status
    createdAt
    invitedByUser {
      id
      displayName
      email
    }
  }
}

# Get invitation by token (public - for accepting invitations)
query GetInvitationByToken($token: String!) @auth(level: NO_ACCESS) {
  workspaceInvitations(
    where: { token: { eq: $token } }
    limit: 1
  ) {
    id
    email
    role
    expiresAt
    status
    createdAt
    workspace {
      id
      name
      slug
    }
    invitedByUser {
      displayName
      email
    }
  }
}

# Check if user is already a member (for invitation acceptance)
query CheckExistingMembership($workspaceId: UUID!, $userId: String!) @auth(level: NO_ACCESS) {
  workspaceMembers(
    where: { workspaceId: { eq: $workspaceId }, userId: { eq: $userId } }
    limit: 1
  ) {
    role
  }
}

# Check if invitation already exists for email
query CheckExistingInvitation($workspaceId: UUID!, $email: String!) @auth(level: USER) {
  workspaceInvitations(
    where: {
      workspaceId: { eq: $workspaceId }
      email: { eq: $email }
      status: { eq: pending }
    }
    limit: 1
  ) {
    id
    expiresAt
  }
}

# ============================================================================
# TODAY QUEUE (NEEDS)
# ============================================================================

# Get active needs for the today queue
query GetTodayQueue($workspaceId: UUID!) @auth(level: USER_ANON) {
  # RBAC gate: caller must be a member of $workspaceId (redacted; aborts read if not).
  workspaceMembers(
    where: { workspaceId: { eq: $workspaceId }, userId: { eq_expr: "auth.uid" } }
    limit: 1
  ) @redact @check(expr: "this.size() > 0", message: "Not a member of this workspace") {
    role
  }
  needs(
    where: {
      workspace: { id: { eq: $workspaceId } }
      resolvedAt: { isNull: true }
    }
    orderBy: [{ priorityRank: ASC }, { createdAt: ASC }]
    limit: 50
  ) {
    id
    type
    headline
    lede
    priorityRank
    focusSection
    snoozedUntil
    resolvedAt
    agentReasoning
    createdAt
    customer {
      id
      name
      slug
      lifecycle
      arrCents
      tier
    }
    milestone {
      id
      title
      status
      targetDate
    }
    meeting {
      id
      title
      scheduledAt
    }
    # Get recommendations for this need
    needRecommendations_on_need(limit: 1, orderBy: { createdAt: DESC }) {
      primaryAction
      secondaryAction
      rationale
      confidenceText
    }
    # Get threads for this need
    threads_on_need(limit: 1, orderBy: { updatedAt: DESC }) {
      id
      subject
      threadType
      status
    }
    # Get linked agent run (for sidekick questions and plan approvals)
    agentRun {
      id
      status
      clarifyingQuestions
      pausedAt
      # Include plan for plan_approval_required needs
      plan {
        id
        status
      }
    }
  }
}

# Get a single need by ID
query GetNeed($id: UUID!) @auth(level: USER_ANON) {
  # RBAC gate: caller must belong to this record's workspace (redacted; aborts read if not).
  _membership: need(id: $id) @redact @check(expr: "this != null", message: "Need not found") {
    workspace {
      workspaceMembers_on_workspace(where: { userId: { eq_expr: "auth.uid" } }, limit: 1)
        @check(expr: "this.size() > 0", message: "Not a member of this workspace") { role }
    }
  }
  need(id: $id) {
    id
    type
    headline
    lede
    priorityRank
    focusSection
    snoozedUntil
    resolvedAt
    source
    agentReasoning
    createdAt
    updatedAt
    customer {
      id
      name
      slug
      lifecycle
      arrCents
      tier
    }
    milestone {
      id
      title
      status
      targetDate
      description
      blockedReason
    }
    meeting {
      id
      title
      scheduledAt
      durationMinutes
    }
    agentRun {
      id
      agentName
      status
      clarifyingQuestions
      currentStep
      plan {
        id
        status
        headline
      }
    }
    thread { id }
    draftResponses_on_surfacedInNeed(orderBy: { generatedAt: DESC }) {
      id
      subject
      body
      citations
      editedBody
      status
      generatedAt
      thread { id }
    }
    needRecommendations_on_need {
      id
      primaryAction
      secondaryAction
      rationale
      confidenceText
    }
    needEvidences_on_need {
      id
      interaction {
        id
        subject
        summaryAi
        occurredAt
      }
      meeting {
        id
        title
        scheduledAt
      }
    }
    threads_on_need {
      id
      subject
      threadType
      status
      channel
      updatedAt
    }
  }
}

# Check for existing unresolved need of a specific type for a customer
# Used to avoid creating duplicate needs
query GetExistingNeedByType(
  $customerId: UUID!
  $needType: NeedType!
) @auth(level: NO_ACCESS) {
  needs(
    where: {
      customer: { id: { eq: $customerId } }
      type: { eq: $needType }
      resolvedAt: { isNull: true }
    }
    orderBy: { createdAt: DESC }
    limit: 1
  ) {
    id
    headline
    createdAt
  }
}

