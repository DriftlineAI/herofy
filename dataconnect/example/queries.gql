# Get count of unanswered sidekick questions (for nav badge)
query GetSidekickUnansweredCount($workspaceId: UUID!) @auth(level: USER_ANON) {
  # RBAC gate: caller must be a member of $workspaceId (redacted; aborts read if not).
  workspaceMembers(
    where: { workspaceId: { eq: $workspaceId }, userId: { eq_expr: "auth.uid" } }
    limit: 1
  ) @redact @check(expr: "this.size() > 0", message: "Not a member of this workspace") {
    role
  }
  sidekickItems(
    where: {
      workspace: { id: { eq: $workspaceId } }
      type: { eq: asking }
      resolvedAt: { isNull: true }
    }
  ) {
    id
  }
}

# Get all unresolved asking items workspace-wide (for Today queue integration)
query GetSidekickAskingItems($workspaceId: UUID!) @auth(level: USER_ANON) {
  # RBAC gate: caller must be a member of $workspaceId (redacted; aborts read if not).
  workspaceMembers(
    where: { workspaceId: { eq: $workspaceId }, userId: { eq_expr: "auth.uid" } }
    limit: 1
  ) @redact @check(expr: "this.size() > 0", message: "Not a member of this workspace") {
    role
  }
  sidekickItems(
    where: {
      workspace: { id: { eq: $workspaceId } }
      type: { eq: asking }
      resolvedAt: { isNull: true }
    }
    orderBy: [{ isBlocking: DESC }, { createdAt: DESC }]
  ) {
    id
    question
    why
    isBlocking
    createdAt
    customer {
      id
      name
      slug
      tier
      arrCents
      lifecycle
    }
    agentRun {
      id
      agentName
      status
      clarifyingQuestions
      pauseReason
    }
    need {
      id
      headline
    }
  }
}

# Get sidekick alert data for a customer (for contextual banner)
query GetSidekickAlert($workspaceId: UUID!, $customerId: UUID!) @auth(level: USER_ANON) {
  # RBAC gate: caller must be a member of $workspaceId (redacted; aborts read if not).
  workspaceMembers(
    where: { workspaceId: { eq: $workspaceId }, userId: { eq_expr: "auth.uid" } }
    limit: 1
  ) @redact @check(expr: "this.size() > 0", message: "Not a member of this workspace") {
    role
  }
  sidekickItems(
    where: {
      workspace: { id: { eq: $workspaceId } }
      customer: { id: { eq: $customerId } }
      type: { eq: asking }
      resolvedAt: { isNull: true }
    }
    orderBy: [{ isBlocking: DESC }, { createdAt: ASC }]
  ) {
    id
