# Find recent open threads for customer (for inferred matching)
query FindRecentOpenThreads(
  $workspaceId: UUID!
  $customerId: UUID!
  $afterDate: Timestamp!
  $limit: Int
) @auth(level: NO_ACCESS) {
  threads(
    where: {
      workspace: { id: { eq: $workspaceId } }
      customer: { id: { eq: $customerId } }
      status: { eq: open }
      createdAt: { gt: $afterDate }
    }
    orderBy: { createdAt: DESC }
    limit: $limit
  ) {
