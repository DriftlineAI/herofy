      subject
    }
  }
}

# Get interactions by source event ID (for linking threads to needs)
query GetInteractionsBySourceEvent(
  $workspaceId: UUID!
  $sourceEventId: String!
) @auth(level: NO_ACCESS) {
  interactions(
    where: {
      workspace: { id: { eq: $workspaceId } }
      sourceEventId: { eq: $sourceEventId }
    }
    limit: 10
  ) {
