# List agent runs for a workspace with optional filters
query ListAgentRunsForWorkspace(
  $workspaceId: UUID!
  $agentName: String
  $status: AgentStatus
  $limit: Int
) @auth(level: USER_ANON) {
  # RBAC gate: caller must be a member of $workspaceId (redacted; aborts read if not).
  workspaceMembers(
    where: { workspaceId: { eq: $workspaceId }, userId: { eq_expr: "auth.uid" } }
    limit: 1
  ) @redact @check(expr: "this.size() > 0", message: "Not a member of this workspace") {
    role
  }
  agentRuns(
    where: {
      workspace: { id: { eq: $workspaceId } }
      agentName: { eq: $agentName }
      status: { eq: $status }
    }
    orderBy: { createdAt: DESC }
    limit: $limit
  ) {
    id
    agentName
    status
    triggerType
    currentStep
    pausedAt
    startedAt
    completedAt
    errorMessage
    clarifyingQuestions
    customer {
      id
      name
    }
    brief {
      id
    }
    plan {
      id
    }
  }
}

