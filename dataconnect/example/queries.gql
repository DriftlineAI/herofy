# ============================================================================
# TODAY'S WORKLIST
# ============================================================================

# Get worklist items for today across all customers (milestones due soon with goal linkage)
query GetTodayWorklist($workspaceId: UUID!) @auth(level: USER_ANON) {
  # RBAC gate: caller must be a member of $workspaceId (redacted; aborts read if not).
  workspaceMembers(
    where: { workspaceId: { eq: $workspaceId }, userId: { eq_expr: "auth.uid" } }
    limit: 1
  ) @redact @check(expr: "this.size() > 0", message: "Not a member of this workspace") {
    role
  }
  # Get all pending/in-progress milestones across active goals
  milestones(
    where: {
      goal: {
        workspace: { id: { eq: $workspaceId } }
        status: { eq: active }
      }
      status: { in: [not_started, in_progress, blocked] }
    }
    orderBy: [{ targetDate: ASC }, { sortOrder: ASC }]
    limit: 30
  ) {
    id
    title
    description
    ownerSide
    targetDate
    status
    sortOrder
    goalId
    goalRationale
    goal {
      id
      text
      isPrimary
      status
      customer {
        id
        name
        slug
        lifecycle
        arrCents
      }
    }
  }
}

# Get primary goals across the workspace (for today header stats)
query GetWorkspacePrimaryGoals($workspaceId: UUID!) @auth(level: USER) {
  goals(
    where: {
      workspace: { id: { eq: $workspaceId } }
      isPrimary: { eq: true }
      status: { eq: active }
    }
    orderBy: { createdAt: DESC }
    limit: 50
  ) {
    id
