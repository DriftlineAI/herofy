# Find interaction by external message ID (for reply-to matching)
query FindInteractionByExternalRef(
  $workspaceId: UUID!
  $customerId: UUID!
  $messageId: String!
) @auth(level: NO_ACCESS) {
  interactions(
    where: {
      workspace: { id: { eq: $workspaceId } }
      customer: { id: { eq: $customerId } }
      externalRef: { contains: $messageId }
    }
    limit: 1
  ) {
