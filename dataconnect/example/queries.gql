    }
  }
}

# ============================================================================
# SIDEKICK NEEDS (for Sidekick page)
# ============================================================================

# Get all unresolved sidekick_question needs for a workspace
# This is the primary query for the Sidekick page - needs-based, not agent-run-based
query GetSidekickQuestionNeeds($workspaceId: UUID!) @auth(level: USER_ANON) {
  # RBAC gate: caller must be a member of $workspaceId (redacted; aborts read if not).
  workspaceMembers(
    where: { workspaceId: { eq: $workspaceId }, userId: { eq_expr: "auth.uid" } }
    limit: 1
  ) @redact @check(expr: "this.size() > 0", message: "Not a member of this workspace") {
    role
  }
  needs(
    where: {
      workspace: { id: { eq: $workspaceId } }
      type: { eq: sidekick_question }
      resolvedAt: { isNull: true }
    }
    orderBy: [{ priorityRank: ASC }, { createdAt: ASC }]
  ) {
    id
    type
    headline
    lede
    priorityRank
    agentReasoning
    createdAt
    customer {
      id
      name
      slug
      lifecycle
      arrCents
      tier
    }
    agentRun {
      id
      agentName
      status
      currentStep
      pausedAt
      pauseReason
      clarifyingQuestions
    }
  }
}

