}

# Get customers in onboarding/handoff lifecycle for agent triggering
query GetCustomersNeedingOnboarding($workspaceId: UUID!) @auth(level: NO_ACCESS) {
  customers(
    where: {
      workspace: { id: { eq: $workspaceId } }
      lifecycle: { in: [onboarding, handoff] }
    }
    orderBy: { name: ASC }
  ) {
    id
    name
    lifecycle
    aiPlans_on_customer {
      id
    }
  }
}

# Get customer detail with all related data
query GetCustomer($id: UUID!) @auth(level: USER_ANON) {
  # RBAC gate: caller must belong to this record's workspace (redacted; aborts read if not).
  _membership: customer(id: $id) @redact @check(expr: "this != null", message: "Customer not found") {
    workspace {
      workspaceMembers_on_workspace(where: { userId: { eq_expr: "auth.uid" } }, limit: 1)
        @check(expr: "this.size() > 0", message: "Not a member of this workspace") { role }
    }
  }
  customer(id: $id) {
    id
    name
    slug
    oneLiner
    tier
    arrCents
    lifecycle
    daysToRenewal
    onboardingDayCurrent
    onboardingDayTotal
    renewalReadiness
    valueRealizationText
    enrichmentStatus
    rawNotes
    # External source tracking
    externalSource
    externalId
    linkedPages
    # Playbook reference (for onboarding progress)
    adaptedFromPlaybookId
    # Health tracking
    clientSignedDate
    relationshipHealth
    relationshipHealthScore
    relationshipHealthUpdatedBy
    relationshipHealthUpdatedAt
    relationshipHealthReason
    createdAt
    updatedAt
    # Stakeholders
    stakeholders_on_customer {
      id
      name
      email
      role
      status
      sentimentNote
      lastInteractionAt
    }
    # Goals
    goals_on_customer(orderBy: [{ isPrimary: DESC }, { sortOrder: ASC }]) {
      id
      text
      status
      sortOrder
      isPrimary
      # Source attribution
      source
      sourceType
      sourceDate
      sourceInteractionId
      sourceThreadId
      # Last 3 observations per goal
      goalObservations_on_goal(
        where: { status: { eq: active } }
        orderBy: { observedAt: DESC }
        limit: 3
      ) {
        id
        text
        confidence
        sourceType
        observedAt
        sourceInteraction {
          id
          senderName
          occurredAt
        }
      }
    }
    # Signals
    signals_on_customer(
      where: { supersededAt: { isNull: true } }
    ) {
      id
      kind
      state
      sentence
      evidenceText
      nextAction
      generatedAt
    }
    # Milestones
    milestones_on_customer(orderBy: { sortOrder: ASC }) {
      id
      title
      ownerLabel
      ownerSide
      targetDate
      status
      description
      blockedReason
      sortOrder
      goalRationale
      goal {
        id
        text
        isPrimary
      }
    }
    # Commitments
    commitments_on_customer {
      id
      side
      text
      dueLabel
      status
      stake
      stakeHolder {
        id
        name
        role
      }
      createdAt
    }
    # Recent needs
    needs_on_customer(
      where: { resolvedAt: { isNull: true } }
      orderBy: { priorityRank: ASC }
      limit: 5
    ) {
      id
      type
      headline
      lede
      priorityRank
      createdAt
    }
    # Upcoming meetings
    meetings_on_customer(
      orderBy: { scheduledAt: ASC }
      limit: 5
    ) {
      id
      title
      type
      scheduledAt
      durationMinutes
    }
  }
}

