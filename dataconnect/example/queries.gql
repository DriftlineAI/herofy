    createdAt
  }
}

# Get need by thread
query GetNeedByThread(
  $threadId: UUID!
  $workspaceId: UUID!
) @auth(level: NO_ACCESS) {
  threads(
    where: {
      id: { eq: $threadId }
      workspace: { id: { eq: $workspaceId } }
    }
    limit: 1
  ) {
    need {
      id
      type
      headline
      resolvedAt
    }
  }
}

# Get customer interaction history
query GetCustomerInteractions(
  $workspaceId: UUID!
  $customerId: UUID!
  $limit: Int
) @auth(level: USER_ANON) {
  # RBAC gate: caller must be a member of $workspaceId (redacted; aborts read if not).
  workspaceMembers(
    where: { workspaceId: { eq: $workspaceId }, userId: { eq_expr: "auth.uid" } }
    limit: 1
  ) @redact @check(expr: "this.size() > 0", message: "Not a member of this workspace") {
    role
  }
  interactions(
    where: {
      workspace: { id: { eq: $workspaceId } }
      customer: { id: { eq: $customerId } }
    }
    orderBy: { occurredAt: DESC }
    limit: $limit
  ) {
    id
    channel
    direction
    senderName
    subject
    bodyEncrypted
    summaryAi
    occurredAt
    thread {
      id
      subject
    }
  }
}

# Find open need by type for customer
query FindOpenNeedByType(
  $workspaceId: UUID!
  $customerId: UUID!
  $needType: NeedType!
) @auth(level: NO_ACCESS) {
  needs(
    where: {
      _and: [
        { workspace: { id: { eq: $workspaceId } } }
        { customer: { id: { eq: $customerId } } }
        { type: { eq: $needType } }
        { resolvedAt: { isNull: true } }
        { _or: [
          { snoozedUntil: { isNull: true } }
          { snoozedUntil: { lt_expr: "request.time" } }
        ]}
      ]
    }
    orderBy: { createdAt: DESC }
    limit: 1
  ) {
    id
    type
    headline
  }
}

# Get recent threads for customer
query GetRecentThreadsForCustomer(
  $workspaceId: UUID!
  $customerId: UUID!
  $limit: Int
) @auth(level: NO_ACCESS) {
  threads(
    where: {
      workspace: { id: { eq: $workspaceId } }
      customer: { id: { eq: $customerId } }
    }
    orderBy: { updatedAt: DESC }
    limit: $limit
  ) {
    id
    subject
    status
    createdAt
    updatedAt
  }
}

