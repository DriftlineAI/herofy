# ============================================================================
# CUSTOMER HEALTH TRACKING
# ============================================================================

# Update customer health (for agents)
mutation UpdateCustomerHealth(
  $customerId: UUID!
  $relationshipHealth: RelationshipHealth!
  $relationshipHealthScore: Int!
  $relationshipHealthReason: String
  $relationshipHealthUpdatedBy: String!
) @auth(level: USER_ANON) @transaction {
  # RBAC gate: caller must belong to the customer's workspace (derived from $customerId; aborts if not).
  query @redact {
    customer(id: $customerId) @check(expr: "this != null", message: "Customer not found") {
      workspace {
        workspaceMembers_on_workspace(
          where: { userId: { eq_expr: "auth.uid" } }
          limit: 1
        ) @check(expr: "this.size() > 0", message: "Not a member of this workspace") {
          role
        }
      }
    }
  }
  customer_update(
    id: $customerId
    data: {
      relationshipHealth: $relationshipHealth
      relationshipHealthScore: $relationshipHealthScore
      relationshipHealthReason: $relationshipHealthReason
      relationshipHealthUpdatedBy: $relationshipHealthUpdatedBy
      relationshipHealthUpdatedAt_expr: "request.time"
    }
  )
}

# Update customer health with user auth (for manual overrides)
mutation UpdateCustomerHealthUser(
  $customerId: UUID!
  $relationshipHealth: RelationshipHealth!
  $relationshipHealthScore: Int!
  $relationshipHealthReason: String!
) @auth(level: USER) @transaction {
  # RBAC gate: caller must belong to this record's workspace (aborts if not).
  query @redact {
    customer(id: $customerId) @check(expr: "this != null", message: "Customer not found") {
      workspace {
        workspaceMembers_on_workspace(where: { userId: { eq_expr: "auth.uid" } }, limit: 1)
          @check(expr: "this.size() > 0", message: "Not a member of this workspace") { role }
      }
    }
  }
  customer_update(
    id: $customerId
    data: {
      relationshipHealth: $relationshipHealth
      relationshipHealthScore: $relationshipHealthScore
      relationshipHealthReason: $relationshipHealthReason
      relationshipHealthUpdatedBy_expr: "auth.uid"
      relationshipHealthUpdatedAt_expr: "request.time"
    }
  )
}

