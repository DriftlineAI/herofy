}

# Set only the renewal date (daysToRenewal) on a customer — used by the
# Renewals page inline editor. Minimal field set so it never nulls other columns.
mutation SetCustomerRenewalDate($id: UUID!, $daysToRenewal: Int) @auth(level: USER) @transaction {
  # RBAC gate: caller must belong to this record's workspace (aborts if not).
  query @redact {
    customer(id: $id) @check(expr: "this != null", message: "Customer not found") {
      workspace {
        workspaceMembers_on_workspace(where: { userId: { eq_expr: "auth.uid" } }, limit: 1)
          @check(expr: "this.size() > 0", message: "Not a member of this workspace") { role }
      }
    }
  }
  customer_update(id: $id, data: { daysToRenewal: $daysToRenewal })
}

# ============================================================================
# METRIC SNAPSHOTS (time-series substrate — see docs/plans/SIGNAL_AGGREGATION.md)
# ============================================================================

# Append one metric snapshot. Backend-only (all metric writes are server-side).
# capturedAt / createdAt are server-defaulted (request.time) — never passed in.
mutation CreateMetricSnapshot(
  $workspaceId: UUID!
  $customerId: UUID!
  $stakeholderId: UUID
  $metric: String!
  $value: Float
  $state: String
  $prevValue: Float
  $trigger: String!
  $inputs: String!
) @auth(level: NO_ACCESS) {
  metricSnapshot_insert(
    data: {
      workspaceId: $workspaceId
      customerId: $customerId
      stakeholderId: $stakeholderId
      metric: $metric
      value: $value
      state: $state
      prevValue: $prevValue
      trigger: $trigger
      inputs: $inputs
    }
  )
}

# Delete one snapshot by id — used by the retention job to downsample old raw rows.
mutation DeleteMetricSnapshot($id: UUID!) @auth(level: NO_ACCESS) {
  metricSnapshot_delete(id: $id)
}
