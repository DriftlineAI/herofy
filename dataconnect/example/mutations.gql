# ============================================================================
# OAUTH STATE MANAGEMENT
# ============================================================================

# Create OAuth state for CSRF protection
mutation CreateOAuthState(
  $state: String!
  $workspaceId: UUID!
  $integrationType: IntegrationType!
  $userId: String!
  $redirectUri: String!
  $codeVerifier: String
  $expiresAt: Timestamp!
) @auth(level: NO_ACCESS) {
  oAuthState_insert(
    data: {
      state: $state
      workspaceId: $workspaceId
      integrationType: $integrationType
      userId: $userId
      redirectUri: $redirectUri
      codeVerifier: $codeVerifier
      expiresAt: $expiresAt
      consumed: false
    }
  )
}

# Mark OAuth state as consumed (atomic update)
mutation ConsumeOAuthState($state: String!) @auth(level: NO_ACCESS) {
  oAuthState_updateMany(
    where: { state: { eq: $state }, consumed: { eq: false } }
    data: { consumed: true }
  )
}

# Delete expired OAuth states (cleanup)
mutation DeleteExpiredOAuthStates($now: Timestamp!) @auth(level: NO_ACCESS) {
  oAuthState_deleteMany(
    where: {
      _or: [
        { expiresAt: { lt: $now } }
        { consumed: { eq: true } }
      ]
    }
  )
}

