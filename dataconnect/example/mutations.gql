# Delete all customers for a workspace (for testing/reset)
mutation DeleteAllCustomersForWorkspace($workspaceId: UUID!) @auth(level: USER) @transaction {
  # RBAC gate: destructive — caller must be an owner/admin of $workspaceId (redacted; aborts if not).
  query @redact {
    workspaceMembers(where: { workspaceId: { eq: $workspaceId } }) @check(
      expr: "this.exists(m, m.userId == auth.uid && (m.role == 'owner' || m.role == 'admin'))"
      message: "Owner or admin only"
    ) {
      userId
      role
    }
  }
  customer_deleteMany(where: { workspaceId: { eq: $workspaceId } })
}

# Delete all customers for a workspace - PUBLIC for scripts (testing only)
mutation DeleteAllCustomersForWorkspacePublic($workspaceId: UUID!) @auth(level: NO_ACCESS) {
