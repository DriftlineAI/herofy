# Create a join request for a workspace
mutation CreateJoinRequest($workspaceId: UUID!, $userId: String!, $userEmail: String!) @auth(level: USER) {
  # Self-own: userId is forced to the caller's uid ($userId is ignored), so a caller can only
  # request to join on their own behalf. Pre-membership by design — no workspace @check.
  workspaceJoinRequest_insert(
    data: {
      workspaceId: $workspaceId
      userId_expr: "auth.uid"
      userEmail: $userEmail
    }
  )
}

# Approve a join request (adds user to workspace)
mutation ApproveJoinRequest($requestId: UUID!, $reviewedByUserId: String!) @auth(level: USER) @transaction {
  # RBAC gate: caller must belong to this record's workspace (aborts if not).
  query @redact {
    workspaceJoinRequest(id: $requestId) @check(expr: "this != null", message: "Join request not found") {
      workspace {
        workspaceMembers_on_workspace(where: { userId: { eq_expr: "auth.uid" } }, limit: 1)
          @check(expr: "this.size() > 0", message: "Not a member of this workspace") { role }
      }
    }
  }
  workspaceJoinRequest_update(
    id: $requestId
    data: {
      status: approved
      reviewedAt_expr: "request.time"
      reviewedByUserId: $reviewedByUserId
    }
  )
}

# Reject a join request
mutation RejectJoinRequest($requestId: UUID!, $reviewedByUserId: String!) @auth(level: USER) @transaction {
  # RBAC gate: caller must belong to this record's workspace (aborts if not).
  query @redact {
    workspaceJoinRequest(id: $requestId) @check(expr: "this != null", message: "Join request not found") {
      workspace {
