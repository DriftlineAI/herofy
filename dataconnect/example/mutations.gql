    ) @check(expr: "this.size() > 0", message: "Not a member of this workspace") {
      role
    }
  }
  goal_insert(
    data: {
      workspaceId: $workspaceId
      customerId: $customerId
      text: $text
      status: $status
      sortOrder: $sortOrder
    }
  )
}

# Update goal
mutation UpdateGoal($id: UUID!, $text: String, $status: GoalStatus, $sortOrder: Int) @auth(level: USER) @transaction {
  # RBAC gate: caller must belong to this record's workspace (aborts if not).
  query @redact {
    goal(id: $id) @check(expr: "this != null", message: "Goal not found") {
      workspace {
        workspaceMembers_on_workspace(where: { userId: { eq_expr: "auth.uid" } }, limit: 1)
          @check(expr: "this.size() > 0", message: "Not a member of this workspace") { role }
      }
    }
  }
  goal_update(
    id: $id
    data: { text: $text, status: $status, sortOrder: $sortOrder }
  )
}

# Set a goal as the primary goal (Mission Objective) for a customer
# Clears isPrimary on other goals for the same customer first
mutation SetPrimaryGoal($goalId: UUID!, $customerId: UUID!) @auth(level: NO_ACCESS) {
  # First clear any existing primary goal for this customer
  goal_updateMany(
    where: { customerId: { eq: $customerId }, isPrimary: { eq: true } }
    data: { isPrimary: false }
  )
  # Then set the specified goal as primary
  goal_update(
    id: $goalId
    data: { isPrimary: true }
  )
}

# Delete goal
mutation DeleteGoal($id: UUID!) @auth(level: USER) @transaction {
  # RBAC gate: caller must belong to this record's workspace (aborts if not).
  query @redact {
    goal(id: $id) @check(expr: "this != null", message: "Goal not found") {
      workspace {
