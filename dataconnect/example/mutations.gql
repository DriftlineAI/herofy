# ============================================================================
# CUSTOMER STRATEGY
# ============================================================================

# NOTE: there is no `UpsertCustomerStrategy` — CustomerStrategy has no unique key on `customer`, so
# DataConnect can't express a keyless upsert (the connector build rejects it). The backend does
# find-then-update-or-create: GetCustomerStrategy + UpdateCustomerStrategy / CreateCustomerStrategyWithId.

# Update customer strategy body
mutation UpdateCustomerStrategy(
  $id: UUID!
  $body: String!
  $lastUpdatedBy: String
) @auth(level: NO_ACCESS) {
  customerStrategy_update(
    id: $id
    data: {
      body: $body
      lastUpdatedBy: $lastUpdatedBy
      updatedAt_expr: "request.time"
    }
  )
}

# Delete customer strategy
mutation DeleteCustomerStrategy($id: UUID!) @auth(level: NO_ACCESS) {
  customerStrategy_delete(id: $id)
}

