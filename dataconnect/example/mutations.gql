# Adopt a template to workspace (creates a workspace playbook from template)
mutation AdoptPlaybookTemplate(
  $workspaceId: UUID!
  $name: String!
  $archetype: String
  $fitNote: String
  $adoptedFromTemplateId: UUID!
) @auth(level: USER) @transaction {
  # RBAC gate: caller must be a member of $workspaceId (redacted; aborts write if not).
  query @redact {
    workspaceMembers(
      where: { workspaceId: { eq: $workspaceId }, userId: { eq_expr: "auth.uid" } }
      limit: 1
    ) @check(expr: "this.size() > 0", message: "Not a member of this workspace") {
      role
    }
  }
  playbook_insert(
    data: {
      workspaceId: $workspaceId
      name: $name
      archetype: $archetype
      fitNote: $fitNote
      adoptedFromTemplateId: $adoptedFromTemplateId
    }
  )
}

# Create playbook milestone with source block reference
mutation CreatePlaybookMilestoneFromBlock(
  $playbookId: UUID!
  $title: String!
  $ownerSide: OwnerSide!
  $durationDays: Int!
  $description: String
  $sortOrder: Int!
  $sourceBlockId: UUID
) @auth(level: USER_ANON) @transaction {
  # RBAC gate: caller must belong to the playbook's workspace (derived from $playbookId; aborts if not).
  query @redact {
    playbook(id: $playbookId) @check(expr: "this != null", message: "Playbook not found") {
      workspace {
        workspaceMembers_on_workspace(
          where: { userId: { eq_expr: "auth.uid" } }
          limit: 1
        ) @check(expr: "this.size() > 0", message: "Not a member of this workspace") {
          role
        }
      }
    }
  }
  playbookMilestone_insert(
    data: {
      playbookId: $playbookId
      title: $title
      ownerSide: $ownerSide
      durationDays: $durationDays
      description: $description
      sortOrder: $sortOrder
      sourceBlockId: $sourceBlockId
    }
  )
}

