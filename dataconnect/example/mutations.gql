# ============================================================================
# HUDDLES — internal discussion create/post/resolve (conversation interface)
# ============================================================================

mutation CreateHuddle(
  $workspaceId: UUID!
  $customerId: UUID!
  $threadId: UUID!
  $anchorInteractionId: UUID
  $title: String
  $createdByUserId: String
) @auth(level: USER_ANON) @transaction {
  # RBAC gate: caller must be a member of $workspaceId (redacted; aborts insert if not).
  query @redact {
    workspaceMembers(
      where: { workspaceId: { eq: $workspaceId }, userId: { eq_expr: "auth.uid" } }
      limit: 1
    ) @check(expr: "this.size() > 0", message: "Not a member of this workspace") {
      role
    }
  }
  huddle_insert(
    data: {
      workspaceId: $workspaceId
      customerId: $customerId
      threadId: $threadId
      anchorInteractionId: $anchorInteractionId
      title: $title
      createdByUserId: $createdByUserId
      status: open
    }
  )
}

# Post a message into a huddle. authorKind "user" (authorUserId set) or "agent" (@sidekick).
mutation PostHuddleMessage(
  $huddleId: UUID!
  $authorUserId: String
  $authorKind: String!
  $body: String!
  $mentions: String
) @auth(level: USER_ANON) @transaction {
  # RBAC gate: caller must belong to the huddle's workspace (derived from $huddleId; aborts if not).
  query @redact {
    huddle(id: $huddleId) @check(expr: "this != null", message: "Huddle not found") {
      workspace {
        workspaceMembers_on_workspace(
          where: { userId: { eq_expr: "auth.uid" } }
          limit: 1
        ) @check(expr: "this.size() > 0", message: "Not a member of this workspace") {
          role
        }
      }
    }
  }
  huddleMessage_insert(
    data: {
      huddleId: $huddleId
      authorUserId: $authorUserId
      authorKind: $authorKind
      body: $body
      mentions: $mentions
    }
  )
}

mutation ResolveHuddle($id: UUID!) @auth(level: USER_ANON) @transaction {
  # RBAC gate: caller must belong to the huddle's workspace (derived from $id; aborts if not).
  query @redact {
    huddle(id: $id) @check(expr: "this != null", message: "Huddle not found") {
      workspace {
        workspaceMembers_on_workspace(
          where: { userId: { eq_expr: "auth.uid" } }
          limit: 1
        ) @check(expr: "this.size() > 0", message: "Not a member of this workspace") {
          role
        }
      }
    }
  }
  huddle_update(id: $id, data: { status: resolved, resolvedAt_expr: "request.time" })
}

# Demo reset: remove DraftResponses the Support play hung off the demo event's Needs, scoped by
# need ids (never touches real drafts). Run BEFORE deleting the Needs (FK). deleteMany filters
# scalar columns only, so we filter the FK `surfacedInNeedId` (not a nested relation).
mutation DeleteDraftsByNeeds($needIds: [UUID!]!) @auth(level: NO_ACCESS) {
  draftResponse_deleteMany(where: { surfacedInNeedId: { in: $needIds } })
}

# Demo reset: delete Interactions seeded by demo events (has sourceEventId set).
# Run BEFORE deleting Threads (FK: interaction.threadId → thread.id).
mutation DeleteDemoInteractionsBySourceEvents($sourceEventIds: [String!]!) @auth(level: NO_ACCESS) {
  interaction_deleteMany(where: { sourceEventId: { in: $sourceEventIds } })
}

# Demo reset: delete Threads seeded by demo events (externalThreadId matches demo event IDs).
# Run AFTER deleting Interactions, BEFORE deleting Needs (thread.needId → need.id FK).
mutation DeleteDemoThreadsByExternalIds($externalThreadIds: [String!]!) @auth(level: NO_ACCESS) {
  thread_deleteMany(where: { externalThreadId: { in: $externalThreadIds } })
}

# ── Pipeline test reset ────────────────────────────────────────────────────────
# Supersede all sweep-generated signals so the detector sees them as fresh on
# the next run. model='sweep' is the marker written by SignalSweepService.
mutation SupersedeSweepSignals($workspaceId: UUID!) @auth(level: NO_ACCESS) {
  signal_updateMany(
    where: {
      workspaceId: { eq: $workspaceId }
      model: { eq: "sweep" }
      supersededAt: { isNull: true }
    }
    data: { supersededAt_expr: "request.time" }
  )
}

# Resolve open needs whose types the sweep generates, so FindOpenNeedByType
# dedup check clears and fresh needs can be created on the next run.
mutation ResolveSweepGeneratedNeeds($workspaceId: UUID!) @auth(level: NO_ACCESS) {
  need_updateMany(
    where: {
      workspaceId: { eq: $workspaceId }
      type: { in: [going_dark, frustrated_signal] }
      resolvedAt: { isNull: true }
    }
    data: { resolvedAt_expr: "request.time", status: resolved }
  )
}

