# Herofy Mutations
# These mutations handle data creation and updates

# ============================================================================
# USER & WORKSPACE
# ============================================================================

# Upsert user on login (creates or updates based on Firebase Auth UID)
mutation UpsertUser($email: String!, $displayName: String, $avatarUrl: String) @auth(level: USER) {
  user_upsert(
    data: {
      id_expr: "auth.uid"
      email: $email
      displayName: $displayName
      avatarUrl: $avatarUrl
    }
  )
}

# Create a new workspace
mutation CreateWorkspace($name: String!, $slug: String!) @auth(level: USER) {
  workspace_insert(data: { name: $name, slug: $slug })
}

# Update workspace name and value prop
mutation UpdateWorkspace($id: UUID!, $name: String!, $slug: String!, $valueProp: String) @auth(level: USER) @transaction {
  # RBAC gate: caller must be a member of this workspace.
  query @redact {
    workspace(id: $id) @check(expr: "this != null", message: "Workspace not found") {
      workspaceMembers_on_workspace(where: { userId: { eq_expr: "auth.uid" } }, limit: 1)
        @check(expr: "this.size() > 0", message: "Not a member of this workspace") { role }
    }
  }
  workspace_update(
    id: $id
    data: { name: $name, slug: $slug, valueProp: $valueProp }
  )
}

# Mark workspace setup as complete
mutation CompleteWorkspaceSetup($workspaceId: UUID!) @auth(level: USER) @transaction {
  # RBAC gate: caller must be a member of $workspaceId (redacted; aborts write if not).
  query @redact {
    workspaceMembers(
      where: { workspaceId: { eq: $workspaceId }, userId: { eq_expr: "auth.uid" } }
      limit: 1
    ) @check(expr: "this.size() > 0", message: "Not a member of this workspace") {
      role
    }
  }
  workspace_update(
    id: $workspaceId
    data: { setupCompleted: true }
  )
}

# Mark user's workspace setup as complete (updates the per-user hasCompletedSetup flag)
mutation CompleteUserWorkspaceSetup($workspaceId: UUID!, $userId: String!) @auth(level: USER) @transaction {
  # RBAC gate: caller must be a member of $workspaceId (redacted; aborts write if not).
  query @redact {
    workspaceMembers(
      where: { workspaceId: { eq: $workspaceId }, userId: { eq_expr: "auth.uid" } }
      limit: 1
    ) @check(expr: "this.size() > 0", message: "Not a member of this workspace") {
      role
    }
  }
  workspaceMember_update(
    key: { workspaceId: $workspaceId, userId: $userId }
    data: { hasCompletedSetup: true }
  )
}

# Mark user's workspace setup as complete (PUBLIC - for seeding/testing)
mutation CompleteUserWorkspaceSetupPublic($workspaceId: UUID!, $userId: String!) @auth(level: NO_ACCESS) {
  workspaceMember_update(
    key: { workspaceId: $workspaceId, userId: $userId }
    data: { hasCompletedSetup: true }
  )
}

# Add user to workspace
mutation AddWorkspaceMember($workspaceId: UUID!, $userId: String!, $role: WorkspaceRole!, $hasCompletedSetup: Boolean) @auth(level: USER) @transaction {
  # RBAC gate: allow only (a) bootstrapping a brand-new workspace (no members yet — the creator adds
  # themselves as owner during provisioning) OR (b) additions by an existing owner/admin of the
  # workspace (the join-approval path). Without this, any authenticated user could self-insert as
  # owner of an arbitrary workspace and thereby satisfy every membership @check added elsewhere.
  query @redact {
    workspaceMembers(where: { workspaceId: { eq: $workspaceId } }) @check(
      expr: "this.size() == 0 || this.exists(m, m.userId == auth.uid && (m.role == 'owner' || m.role == 'admin'))"
      message: "Not authorized to add members to this workspace"
    ) {
      userId
      role
    }
  }
  workspaceMember_insert(
    data: {
      workspaceId: $workspaceId
      userId: $userId
      role: $role
      hasCompletedSetup: $hasCompletedSetup
    }
  )
}

# Update workspace member role
mutation UpdateMemberRole($workspaceId: UUID!, $userId: String!, $role: WorkspaceRole!) @auth(level: NO_ACCESS) {
  workspaceMember_update(
    key: { workspaceId: $workspaceId, userId: $userId }
    data: { role: $role }
  )
}

# Remove workspace member
mutation RemoveWorkspaceMember($workspaceId: UUID!, $userId: String!) @auth(level: NO_ACCESS) {
  workspaceMember_delete(
    key: { workspaceId: $workspaceId, userId: $userId }
  )
}

# Remove workspace member (PUBLIC - for seeding/testing)
mutation RemoveWorkspaceMemberPublic($workspaceId: UUID!, $userId: String!) @auth(level: NO_ACCESS) {
  workspaceMember_delete(
    key: { workspaceId: $workspaceId, userId: $userId }
  )
}

# Add workspace member (PUBLIC - for seeding/testing)
mutation AddWorkspaceMemberPublic($workspaceId: UUID!, $userId: String!, $role: WorkspaceRole!, $hasCompletedSetup: Boolean) @auth(level: NO_ACCESS) {
  workspaceMember_insert(
    data: {
      workspaceId: $workspaceId
      userId: $userId
      role: $role
      hasCompletedSetup: $hasCompletedSetup
    }
  )
}

# Delete workspace (PUBLIC - for testing/cleanup)
mutation DeleteWorkspacePublic($id: UUID!) @auth(level: NO_ACCESS) {
  workspace_delete(id: $id)
}

# ============================================================================
# WORKSPACE INVITATIONS
# ============================================================================

# Create invitation
mutation CreateInvitation(
  $workspaceId: UUID!
  $email: String!
  $role: WorkspaceRole!
  $invitedByUserId: String!
  $token: String!
  $expiresAt: Timestamp!
) @auth(level: NO_ACCESS) {
  workspaceInvitation_insert(
    data: {
      workspaceId: $workspaceId
      email: $email
      role: $role
      invitedByUserId: $invitedByUserId
      token: $token
      expiresAt: $expiresAt
    }
  )
}

# Accept invitation (update status)
mutation AcceptInvitation($id: UUID!, $acceptedByUserId: String!) @auth(level: NO_ACCESS) {
  workspaceInvitation_update(
    id: $id
    data: {
      status: accepted
      acceptedByUserId: $acceptedByUserId
      acceptedAt_expr: "request.time"
    }
  )
}

# Revoke invitation
mutation RevokeInvitation($id: UUID!) @auth(level: USER) @transaction {
  # RBAC gate: caller must belong to this record's workspace (aborts if not).
  query @redact {
    workspaceInvitation(id: $id) @check(expr: "this != null", message: "Invitation not found") {
      workspace {
        workspaceMembers_on_workspace(where: { userId: { eq_expr: "auth.uid" } }, limit: 1)
          @check(expr: "this.size() > 0", message: "Not a member of this workspace") { role }
      }
    }
  }
  workspaceInvitation_update(
    id: $id
    data: { status: revoked }
  )
}

# Delete invitation (cleanup)
mutation DeleteInvitation($id: UUID!) @auth(level: NO_ACCESS) {
  workspaceInvitation_delete(id: $id)
}

