# ============================================================================
# ORCHESTRATOR — AgentTask work queue (net-new, side-by-side with handoff_auto)
# ============================================================================

mutation CreateAgentTask(
  $workspaceId: UUID!
  $customerId: UUID
  $taskType: String!
  $triggerType: String!
  $payload: String!
  $priority: Int!
  $scheduledFor: Timestamp!
) @auth(level: NO_ACCESS) {
  agentTask_insert(
    data: {
      workspaceId: $workspaceId
      customerId: $customerId
      taskType: $taskType
      triggerType: $triggerType
      payload: $payload
      status: pending
      priority: $priority
      scheduledFor: $scheduledFor
    }
  )
}

# Guarded optimistic claim — compare-and-swap. Returns count: 1 = claimed, 0 = lost
# the race / already claimed / not yet due. Stands in for SELECT ... FOR UPDATE SKIP LOCKED.
mutation ClaimAgentTask($id: UUID!, $now: Timestamp!) @auth(level: NO_ACCESS) {
  agentTask_updateMany(
    where: {
      id: { eq: $id }
      status: { eq: pending }
      scheduledFor: { le: $now }
    }
    data: {
      status: in_progress
      claimedAt_expr: "request.time"
    }
  )
}

# Generic status transition (e.g. link the agent run; pause to waiting with a
# blocking need; flip back to pending on HITL resume).
mutation UpdateAgentTaskStatus(
  $id: UUID!
  $status: AgentTaskStatus!
  $agentRunId: UUID
  $blockingNeedId: UUID
) @auth(level: NO_ACCESS) {
  agentTask_update(
    id: $id
    data: {
      status: $status
      agentRunId: $agentRunId
      blockingNeedId: $blockingNeedId
    }
  )
}

mutation EscalateAgentTaskPriority(
  $id: UUID!
  $priority: Int!
) @auth(level: NO_ACCESS) {
  agentTask_update(
    id: $id
    data: { priority: $priority, scheduledFor_expr: "request.time" }
  )
}

# Reset all pending tasks to be immediately due (for pipeline test resets)
mutation FastForwardPendingTasks($workspaceId: UUID!) @auth(level: NO_ACCESS) {
  agentTask_updateMany(
    where: {
      workspaceId: { eq: $workspaceId }
      status: { eq: pending }
    }
    data: { scheduledFor_expr: "request.time" }
  )
}

mutation CompleteAgentTask(
  $id: UUID!
  $status: AgentTaskStatus!
  $result: String
  $errorMessage: String
) @auth(level: NO_ACCESS) {
  agentTask_update(
    id: $id
    data: {
      status: $status
      result: $result
      errorMessage: $errorMessage
      completedAt_expr: "request.time"
    }
  )
}

# ----------------------------------------------------------------------------
# Demo reset — delete what a prior /demo-agent run created so re-runs don't dupe.
# All scoped to a specific workspace + demo customer + demo markers; never touches
# real data.
# ----------------------------------------------------------------------------

# Delete demo-lineage tasks for the customer: the seed triage ("demo") AND any
# self-enqueued follow-ups it produced ("play"). Keeps re-runs from accumulating.
mutation DeleteDemoAgentTasks($workspaceId: UUID!, $customerId: UUID!) @auth(level: NO_ACCESS) {
  agentTask_deleteMany(
    where: {
      workspaceId: { eq: $workspaceId }
      customerId: { eq: $customerId }
      triggerType: { in: ["demo", "play"] }
    }
  )
}

# Delete the worker's observations/tips for the demo customer on reset.
mutation DeleteDemoSidekickItems($workspaceId: UUID!, $customerId: UUID!) @auth(level: NO_ACCESS) {
