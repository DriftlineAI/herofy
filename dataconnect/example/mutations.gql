# ============================================================================

# Snooze a need
mutation SnoozeNeed($id: UUID!, $snoozedUntil: Timestamp!) @auth(level: USER_ANON) @transaction {
  # RBAC gate: caller must belong to this record's workspace (aborts if not).
  query @redact {
    need(id: $id) @check(expr: "this != null", message: "Need not found") {
      workspace {
        workspaceMembers_on_workspace(where: { userId: { eq_expr: "auth.uid" } }, limit: 1)
          @check(expr: "this.size() > 0", message: "Not a member of this workspace") { role }
      }
    }
  }
  need_update(id: $id, data: { snoozedUntil: $snoozedUntil, status: snoozed })
}

# Mark a Need awaiting the customer with a re-surface floor: keeps the truthful
# awaiting_customer status (we acted — ball's in their court) but hides it from the
# Today queue until $snoozedUntil. Used after an outreach send so a still-dark account
# clears "what to do now" yet reappears later if they never reply (distinct from SnoozeNeed,
# which flips status to snoozed — here the work state stays awaiting_customer).
mutation MarkNeedAwaitingResurface($id: UUID!, $snoozedUntil: Timestamp!) @auth(level: USER_ANON) @transaction {
  # RBAC gate: caller must belong to this record's workspace (aborts if not).
  query @redact {
    need(id: $id) @check(expr: "this != null", message: "Need not found") {
      workspace {
        workspaceMembers_on_workspace(where: { userId: { eq_expr: "auth.uid" } }, limit: 1)
          @check(expr: "this.size() > 0", message: "Not a member of this workspace") { role }
      }
    }
  }
  need_update(id: $id, data: { snoozedUntil: $snoozedUntil, status: awaiting_customer })
}

# Resolve a need
mutation ResolveNeed($id: UUID!) @auth(level: USER_ANON) @transaction {
  # RBAC gate: caller must belong to this record's workspace (aborts if not).
  query @redact {
    need(id: $id) @check(expr: "this != null", message: "Need not found") {
      workspace {
        workspaceMembers_on_workspace(where: { userId: { eq_expr: "auth.uid" } }, limit: 1)
          @check(expr: "this.size() > 0", message: "Not a member of this workspace") { role }
      }
    }
  }
  need_update(id: $id, data: { resolvedAt_expr: "request.time", status: resolved })
}

# Unresolve a need (reopen) — clears the timestamps and returns to needs_response.
mutation UnresolveNeed($id: UUID!) @auth(level: NO_ACCESS) {
  need_update(id: $id, data: { resolvedAt: null, snoozedUntil: null, status: needs_response })
}

# Set a Need's workflow status directly (e.g. awaiting_customer / blocked — the
# transitions resolve/snooze don't cover).
mutation UpdateNeedStatus($id: UUID!, $status: WorkflowStatus!) @auth(level: USER) @transaction {
  # RBAC gate: caller must belong to this record's workspace (aborts if not).
  query @redact {
    need(id: $id) @check(expr: "this != null", message: "Need not found") {
