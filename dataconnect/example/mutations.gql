) @auth(level: USER) @transaction {
  # RBAC gate: caller must be a member of $workspaceId (redacted; aborts write if not).
  query @redact {
    workspaceMembers(
      where: { workspaceId: { eq: $workspaceId }, userId: { eq_expr: "auth.uid" } }
