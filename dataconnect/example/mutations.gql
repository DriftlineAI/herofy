# ── Re-engagement: a fresh inbound message means the customer is no longer DARK.
# Supersede absence signals (going_dark, cadence) and resolve open going_dark needs
# for that customer. Other risk (sentiment, renewal) is untouched — a churning
# customer still emails about simple things. ──────────────────────────────────
mutation SupersedeAbsenceSignalsForCustomer($workspaceId: UUID!, $customerId: UUID!) @auth(level: NO_ACCESS) {
  signal_updateMany(
    where: {
      workspaceId: { eq: $workspaceId }
      customerId: { eq: $customerId }
      kind: { in: [going_dark, cadence] }
      supersededAt: { isNull: true }
    }
    data: { supersededAt_expr: "request.time" }
  )
}

mutation ResolveGoingDarkNeedsForCustomer($workspaceId: UUID!, $customerId: UUID!) @auth(level: NO_ACCESS) {
  need_updateMany(
    where: {
      workspaceId: { eq: $workspaceId }
      customerId: { eq: $customerId }
      type: { eq: going_dark }
      resolvedAt: { isNull: true }
    }
    data: { resolvedAt_expr: "request.time", status: resolved }
  )
}

# ============================================================================
# RENEWALS — profile / plays / risk items + stakeholder & vector renewal fields
# All PUBLIC: written by the seed today, orchestrator-ready for later.
# ============================================================================

mutation UpsertRenewalProfile(
  $id: UUID!
  $workspaceId: UUID!
  $customerId: UUID!
  $posture: RenewalPosture!
  $postureReason: String
  $narrativeLede: String
  $targetArrCents: Int64
  $expansionPipeCents: Int64
  $renewalType: String
  $autoRenew: Boolean
  $termNote: String
  $lastPriceChangeNote: String
  $postureSetBy: String
) @auth(level: NO_ACCESS) {
  renewalProfile_upsert(
    data: {
      id: $id
      workspaceId: $workspaceId
      customerId: $customerId
      posture: $posture
      postureReason: $postureReason
      narrativeLede: $narrativeLede
      targetArrCents: $targetArrCents
      expansionPipeCents: $expansionPipeCents
      renewalType: $renewalType
      autoRenew: $autoRenew
      termNote: $termNote
      lastPriceChangeNote: $lastPriceChangeNote
      postureSetBy: $postureSetBy
      postureDerivedAt_expr: "request.time"
    }
  )
}

mutation DeleteRenewalProfile($id: UUID!) @auth(level: NO_ACCESS) {
  renewalProfile_delete(id: $id)
}

