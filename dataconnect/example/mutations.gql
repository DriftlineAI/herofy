# CSM marks a save-play step complete (and/or attaches optional findings). Frontend-callable;
# RBAC gate walks step -> brief -> customer -> workspace -> members.
mutation UpdateRiskPlayStep($id: UUID!, $done: Boolean!, $notes: String) @auth(level: USER_ANON) @transaction {
  query @redact {
    riskPlayStep(id: $id) @check(expr: "this != null", message: "Step not found") {
      brief {
        customer {
          workspace {
            workspaceMembers_on_workspace(where: { userId: { eq_expr: "auth.uid" } }, limit: 1)
              @check(expr: "this.size() > 0", message: "Not a member of this workspace") { role }
          }
        }
      }
    }
  }
  riskPlayStep_update(id: $id, data: { done: $done, notes: $notes })
}

# Create a workspace RISK playbook (scenario=risk). Steps are added as
# PlaybookMilestones via the existing CreatePlaybookMilestone mutation
# (title -> step label, description -> step rationale).
mutation CreateRiskPlaybook($workspaceId: UUID!, $name: String!, $fitNote: String) @auth(level: NO_ACCESS) {
  playbook_insert(
    data: {
      workspaceId: $workspaceId
      name: $name
      fitNote: $fitNote
      scenario: risk
    }
  )
}

# Resume a HITL-paused task WITH the human's answers folded into the payload
# (waiting -> pending, clears the block). The re-claimed run sees the answers.
mutation ResumeAgentTaskWithAnswers($id: UUID!, $payload: String!) @auth(level: NO_ACCESS) {
  agentTask_update(
    id: $id
    data: { status: pending, payload: $payload, blockingNeedId: null }
  )
}

# Insert a CustomerStrategy with an explicit id. Used by the check-then-write path
# (GetCustomerStrategy -> UpdateCustomerStrategy if it exists, else this insert), since
