      nextAction: $nextAction
      model: "demo-seed"
      promptVersion: "demo-v1"
      inputsHash: $inputsHash
      handbookVersionId: "00000000-0000-0000-0000-000000000000"
      generatedAt: $generatedAt
    }
  )
}

