# Herofy Database Schema for Firebase SQL Connect
# Translated from PostgreSQL migrations 001-004

# ============================================================================
# ENUMS
# ============================================================================

enum WorkspaceRole {
  owner
  admin
  member
}

enum JoinRequestStatus {
  pending
  approved
  rejected
}

enum InvitationStatus {
  pending
  accepted
  expired
  revoked
}

enum CustomerLifecycle {
  prospect
  handoff
  onboarding
  active
  renewing
  at_risk
  churned
}

enum RenewalReadiness {
  not_started
  tracking
  ready
  at_risk
}

enum StakeholderStatus {
  active
  departed
}

# Structured importance tier (vs free-text `role`) — drives per-contact weighting
# in the engagement-health model (champion/buyer ≫ user). See ENGAGEMENT_HEALTH_MODEL.md.
enum StakeholderImportance {
  champion
  economic_buyer
  technical
  user
  detractor
  unknown
}

enum GoalStatus {
  active
  achieved
  dropped
}

enum InteractionChannel {
  email
  slack
  meeting
  in_app
  sms_screenshot
  note
}

enum InteractionDirection {
  us
  customer
  internal
}

enum ThreadStatus {
  open
  resolved
  archived
}

enum ThreadCategory {
  support
  onboarding
  success
  uncategorized
}

enum ThreadType {
  customer
  sidekick
  internal
  quarantined
}

enum HuddleStatus {
  open
  resolved
}

enum MeetingSource {
  manual
  google_calendar
  mcp_sync
}

enum MilestoneStatus {
  not_started
  in_progress
  blocked
  done
  skipped
}

enum OwnerSide {
  us
  customer
  joint
}

enum CommitmentStatus {
  in_progress
  done
  overdue
}

enum CommitmentSide {
  us
  them
}

enum SignalKind {
  engagement
  sentiment
  commitments
  going_dark
  cadence
}

enum SignalState {
  ok
  warn
  risk
}

# Goal-centric architecture: Progress Vector categories
enum VectorCategory {
  trust            # Building customer confidence
  risk_mitigation  # De-risking scope/timeline concerns
  stakeholder      # Keeping key stakeholders happy
  value            # Demonstrating concrete wins
  momentum         # Maintaining engagement velocity
}

enum RiskLevel {
  low
  medium
  high
}

# Renewals: the strategic stance for an account's renewal, set by Sidekick
# from the account's signals/readiness/goal-progress.
enum RenewalPosture {
  expand   # Goals green + growth signal → lead with the upsell
  hold     # Healthy but flat → protect value, lock the renewal clean
  defend   # Stalled goal / risk signal / churn pattern → re-anchor value, de-risk
}

# Renewals: the badge/kind on a renewal play card.
enum RenewalPlayKind {
  re_anchor    # Defend: lead with dollarized value proof
  de_risk      # Defend: pre-empt a competitive/consolidation threat
  re_seat      # Defend: re-seat a champion
  upsell       # Expand: new seats / tier bump
  multi_year   # Expand: lock a multi-year term
  co_success   # Hold: agree the next goal together
  early_close  # Hold: incentive for an early commit
}

enum BlastRadius {
  low
  medium
  high
}

enum HandbookDocKind {
  DOCUMENT         # Original handbook documents
  VOICE_CORE       # Core Voice - the foundation for all AI communication
  VOICE_FOUNDATION # Foundation docs (6 default: tone, style, etc.)
  VOICE_SCENARIO   # Scenario-specific tone guides (user-created)
}

enum VoiceSurface {
  SIDEKICK_TIP
  EMAIL_DRAFT
  HITL_QUESTION
  PLAN_STEP
}

enum ApprovalStatus {
  pending_approval
  approved
  rejected
  superseded
}

enum HandoffStatus {
  draft
  confirmed
  needs_correction
}

enum DraftResponseStatus {
  pending_review
  approved
  sent
  discarded
  edited
}

enum NeedType {
  urgent_support
  going_dark
  stalled_milestone
  approaching_renewal
  open_commitment_overdue
  frustrated_signal
  champion_departed
  onboarding_behind
  renewal_at_risk
  new_handoff
  meeting_prep_ready
  positive_signal
  expansion_signal
  check_in_due
  escalation
  plan_approval_required
  draft_response_ready
  sidekick_question
  uncategorized
}

# Workflow status for a Need (the conversation/triage lifecycle). Every Need has
# one (default needs_response). snoozedUntil / resolvedAt carry the *when*; this
# carries the *state*.
enum WorkflowStatus {
  needs_response
  awaiting_customer
  blocked
  snoozed
  resolved
}

enum AgentStatus {
  initialized
  running
  waiting_for_input
  resuming
  completed
  failed
}

enum ConfidenceLevel {
  high
  medium
  low
}

# Orchestrator work-queue task lifecycle (net-new, side-by-side with handoff_auto)
enum AgentTaskStatus {
  pending       # eligible to be claimed (when scheduledFor <= now)
  in_progress   # claimed by a worker, executing
  waiting       # paused for human input (see blockingNeed)
  done          # completed successfully
  failed        # terminal failure
}

enum IntegrationType {
  notion
  notion_mcp
  slack
  gmail
  hubspot
  calendar
}

enum IntegrationStatus {
  pending
  active
  error
  revoked
}

enum EnrichmentStatus {
  pending
  processing
  completed
  failed
}

enum ChangeEventSource {
  gmail
  slack
  calendar
  notion
  hubspot
  manual
}

enum ChangeEventClass {
  new_customer
  structured_field_update
  unstructured_content
  unknown_sender
}

enum SidekickItemType {
  asking      # Questions that block agents
  tip         # Factual suggestions
  observed    # Quieter factual notes (dimmed)
  working     # Agent running (pulse + progress)
  resolved    # History (checkmark, dimmed)
}

enum QuestionType {
  missing_data
  clarification
  ambiguity
  validation
}

enum MeetingStatus {
  scheduled
  completed
  cancelled
  no_show
}

enum MeetingLinkStatus {
  pending
  linked
  unlinked
}

enum RelationshipHealth {
  strong
  healthy
  stable
  at_risk
  deteriorating
}

enum GoalSourceType {
  manual
  transcript
  email
  slack
  meeting
  notion
  ai_inferred
}

enum ObservationStatus {
  active
  inactive
  archived
}

enum BlockCategory {
  kickoff
  setup
  integration
  data
  training
  validation
  launch
  review
}

enum PlaybookComplexity {
  simple      # 1-2 weeks, minimal integration
  standard    # 30-60 days, typical SaaS
  complex     # 60-120 days, enterprise with SSO/integrations
}

enum PlaybookEditType {
  added_milestone
  removed_milestone
  changed_duration
  changed_owner
  reordered
  changed_description
}

# ============================================================================
# CORE TENANCY
# ============================================================================

type Workspace @table {
  id: UUID! @default(expr: "uuidV4()")
  name: String!
  slug: String! @unique
  domain: String  # Email domain for team matching (e.g., "acme.com")
  valueProp: String  # Product value proposition for AI context
  setupCompleted: Boolean @default(value: false)
  createdAt: Timestamp! @default(expr: "request.time")
  updatedAt: Timestamp! @default(expr: "request.time")
}

# Pending join requests for workspaces
type WorkspaceJoinRequest @table {
  id: UUID! @default(expr: "uuidV4()")
  workspace: Workspace!
  userId: String!  # Firebase UID of requesting user
  userEmail: String!
  status: JoinRequestStatus! @default(value: "pending")
  createdAt: Timestamp! @default(expr: "request.time")
  reviewedAt: Timestamp
  reviewedByUser: User
}

# User table keyed by Firebase Auth UID
type User @table {
  id: String! @default(expr: "auth.uid")
  email: String! @unique
  displayName: String
  avatarUrl: String
  createdAt: Timestamp! @default(expr: "request.time")
  updatedAt: Timestamp! @default(expr: "request.time")
}

type WorkspaceMember @table(key: ["workspace", "user"]) {
  workspace: Workspace!
  user: User!
  role: WorkspaceRole! @default(value: "member")
  hasCompletedSetup: Boolean @default(value: false)
  joinedAt: Timestamp! @default(expr: "request.time")
}

type WorkspaceInvitation @table {
  id: UUID! @default(expr: "uuidV4()")
  workspace: Workspace!
  email: String!                                      # Email being invited
  role: WorkspaceRole!                                # Role to grant on accept
  invitedByUser: User!                                # Who sent the invitation
  token: String! @unique                              # URL-safe token for link
  expiresAt: Timestamp!                               # 7 days from creation
  status: InvitationStatus! @default(value: "pending")
  acceptedByUser: User                                # May differ from invited email
  acceptedAt: Timestamp
  createdAt: Timestamp! @default(expr: "request.time")
}

# ============================================================================
# CUSTOMERS
# ============================================================================

type Customer @table {
  id: UUID! @default(expr: "uuidV4()")
  workspace: Workspace!
  name: String!
  slug: String!
  domain: String  # Customer's email domain (e.g., "acme.com")
  oneLiner: String
  tier: String
  arrCents: Int64
  lifecycle: CustomerLifecycle! @default(value: "prospect")
  daysToRenewal: Int
  onboardingDayCurrent: Int
  onboardingDayTotal: Int
  renewalReadiness: RenewalReadiness @default(value: "not_started")
  valueRealizationText: String
  adaptedFromPlaybookId: UUID
  # External source tracking (vendor-agnostic)
  externalSource: String          # "notion", "hubspot", "pipedrive", "csv", etc.
  externalId: String              # The ID in the external system
  lastSyncedAt: Timestamp         # When we last pulled data from external source
  # Linked external pages/resources (JSON array, vendor-agnostic)
  # Format: [{"source": "notion", "id": "page_id", "type": "handoff"|"tracker"|"notes", "url": "...", "title": "...", "hasAccess": true}]
  linkedPages: String
  # AI Enrichment
  rawNotes: String                # Raw CRM notes for AI processing
  enrichmentStatus: EnrichmentStatus @default(value: "pending")
  enrichmentAttempts: Int @default(value: 0)
  enrichmentCompletedAt: Timestamp
  enrichmentError: String
  # AI Classification (during setup)
  aiClassificationGroup: String   # not_yet_customer, new_customer, pointer_needed, ready_to_confirm
  aiClassificationConfidence: Int # 0-100
  aiClassificationReasoning: String
  aiClassificationWhatIKnow: String    # JSON array
  aiClassificationUncertainties: String # JSON array
  aiClassificationAt: Timestamp
  # Client lifecycle tracking
  clientSignedDate: Date  # When client signed contract (distinct from Herofy creation date)
  # Relationship health tracking
  relationshipHealth: RelationshipHealth @default(value: "stable")
  relationshipHealthScore: Int @default(value: 50)  # 0-100
  relationshipHealthUpdatedBy: String  # "agent:name" or "user:uid"
  relationshipHealthUpdatedAt: Timestamp
  relationshipHealthReason: String  # Why this health score (for user overrides)
  createdAt: Timestamp! @default(expr: "request.time")
  updatedAt: Timestamp! @default(expr: "request.time")
}

type Stakeholder @table {
  id: UUID! @default(expr: "uuidV4()")
  workspace: Workspace!
  customer: Customer!
  name: String!
  email: String
  role: String
  status: StakeholderStatus! @default(value: "active")
  sentimentNote: String
  lastInteractionAt: Timestamp
  # Structured importance tier for engagement-health weighting (isChampion kept for
  # back-compat / renewals; champion is also expressible as importance=champion).
  importance: StakeholderImportance @default(value: "unknown")
  # Renewals: champion flag (multi-champion safe) + renewal-specific health stance
  isChampion: Boolean @default(value: false)
  renewalHealth: SignalState  # ok | warn | risk — renewal-specific read, distinct from active/departed
  createdAt: Timestamp! @default(expr: "request.time")
  updatedAt: Timestamp! @default(expr: "request.time")
}

type Goal @table {
  id: UUID! @default(expr: "uuidV4()")
  workspace: Workspace!
  customer: Customer!
  text: String!
  status: GoalStatus! @default(value: "active")
  sortOrder: Int! @default(value: 0)
  # Goal-centric architecture: Mark primary goal (Mission Objective)
  isPrimary: Boolean @default(value: false)  # True = this is the customer's north star goal
  # Source attribution
  source: String! @default(value: "manually added")  # Freeform text for AI display
  sourceType: GoalSourceType! @default(value: "manual")  # Enum for filtering
  sourceDate: Timestamp! @default(expr: "request.time")
  sourceInteractionId: UUID  # Optional link to interaction
  sourceThreadId: UUID  # Optional link to thread
  createdAt: Timestamp! @default(expr: "request.time")
  updatedAt: Timestamp! @default(expr: "request.time")
}

# Goal-centric architecture: Progress Vectors
# Abstract indicators of movement toward a goal (trust, risk, stakeholder happiness, etc.)
type ProgressVector @table {
  id: UUID! @default(expr: "uuidV4()")
  workspace: Workspace!
  customer: Customer!
  goal: Goal!                           # The goal this vector measures progress toward
  category: VectorCategory!             # trust, risk_mitigation, stakeholder, value, momentum
  description: String!                  # "Building trust with Sarah (champion)"
  currentState: SignalState!            # ok, warn, risk - reuses existing enum
  # Numeric progress (optional - falls back to state-based if missing)
  progress: Float                       # 0.0-1.0 representing % toward unlock
  baselineProgress: Float               # 0.0-1.0 snapshot at contract start (the "start" tick on the renewal spine)
  targetProgress: Float                 # Target threshold (e.g., 0.8 = 80%)
  targetLabel: String                   # Display label for target (e.g., "Day 14")
  unlocks: String                       # What completing this vector enables
  assessmentReason: String              # Why this state was assigned
  lastAssessedAt: Timestamp! @default(expr: "request.time")
  lastAssessedBy: String                # "agent:handoff_auto" or "user:uid"
  createdAt: Timestamp! @default(expr: "request.time")
  updatedAt: Timestamp! @default(expr: "request.time")
}

# Goal-centric architecture: Customer Strategy
# Living strategy document - unlike HandoffBrief (point-in-time snapshot),
# this is the ongoing "why we're doing what we're doing" context
type CustomerStrategy @table {
  id: UUID! @default(expr: "uuidV4()")
  workspace: Workspace!
  customer: Customer!
  body: String!                         # Markdown - living strategy memo
  lastUpdatedBy: String                 # "agent:handoff_auto" or "user:uid"
  createdAt: Timestamp! @default(expr: "request.time")
  updatedAt: Timestamp! @default(expr: "request.time")
}

type GoalObservation @table {
  id: UUID! @default(expr: "uuidV4()")
  workspace: Workspace!
  customer: Customer!
  goal: Goal!
  # Observation content
  text: String!
  confidence: ConfidenceLevel!
  # Source tracking - what triggered this observation
  sourceInteractionId: UUID  # e.g., "Marcos mentioned this in..."
  sourceType: String!  # "slack message", "email", "meeting transcript"
  observedAt: Timestamp! @default(expr: "request.time")
  # Deduplication - fingerprint should include workspace_id in hash for workspace scoping
  fingerprint: String! @unique
  # Lifecycle
  status: ObservationStatus! @default(value: "active")
  # Relations
  sourceInteraction: Interaction
  createdAt: Timestamp! @default(expr: "request.time")
  updatedAt: Timestamp! @default(expr: "request.time")
}

# ============================================================================
# NEEDS (Central to the model)
# ============================================================================

type Need @table {
  id: UUID! @default(expr: "uuidV4()")
  workspace: Workspace!
  customer: Customer!
  type: NeedType!
  status: WorkflowStatus! @default(value: "needs_response")
  headline: String!
  lede: String
  priorityRank: Int! @default(value: 100)
  # Relationships - a need can reference various entities
  milestone: Milestone
  meeting: Meeting
  focusSection: String
  snoozedUntil: Timestamp
  resolvedAt: Timestamp
  source: String  # JSON string for {channel, from, quote}
  agentReasoning: String  # Optional reasoning from agent
  handbookVersion: HandbookVersion  # Optional link to handbook version for audit
  agentRun: AgentRun  # Link to agent run for resume flow
  sourceEventId: String  # Links to ChangeEvent that created this need
  # Conversation a need relates to. Many needs may reference one thread (fan-out:
  # e.g. a draft_response_ready AND a renewal_at_risk on the same email). Distinct
  # from thread.need (a thread's primary need); nullable.
  thread: Thread
  createdAt: Timestamp! @default(expr: "request.time")
  updatedAt: Timestamp! @default(expr: "request.time")
}

type NeedRecommendation @table {
  id: UUID! @default(expr: "uuidV4()")
  need: Need!
  rationale: String
  primaryAction: String
  secondaryAction: String
  confidenceText: String
  model: String!
  promptVersion: String!
  generatedAt: Timestamp! @default(expr: "request.time")
  handbookVersionId: UUID!
  createdAt: Timestamp! @default(expr: "request.time")
}

type NeedEvidence @table {
  id: UUID! @default(expr: "uuidV4()")
  need: Need!
  interaction: Interaction
  meeting: Meeting
  commitment: Commitment
  createdAt: Timestamp! @default(expr: "request.time")
}

# ============================================================================
# THREADS & INTERACTIONS
# ============================================================================

type Thread @table {
  id: UUID! @default(expr: "uuidV4()")
  workspace: Workspace!
  customer: Customer!
  need: Need  # Every thread should belong to a need
  subject: String
  status: ThreadStatus! @default(value: "open")
  channel: InteractionChannel
  assignedUser: User
  category: ThreadCategory! @default(value: "uncategorized")
  aiCategorySuggestion: ThreadCategory
  threadType: ThreadType @default(value: "customer")
  externalThreadId: String  # External thread ID for dedup (e.g., Gmail thread ID)
  originDetail: String
  archivedAt: Timestamp
  resolvedAt: Timestamp
  createdAt: Timestamp! @default(expr: "request.time")
  updatedAt: Timestamp! @default(expr: "request.time")
}

type Interaction @table {
  id: UUID! @default(expr: "uuidV4()")
  workspace: Workspace!
  customer: Customer!
  thread: Thread
  channel: InteractionChannel!
  originKind: String
  direction: InteractionDirection!
  senderName: String
  senderUser: User
  stakeholder: Stakeholder  # resolved external sender (null = internal / unresolved)
  occurredAt: Timestamp! @default(expr: "request.time")
  subject: String
  bodyEncrypted: String
  summaryAi: String
  externalRef: String  # JSON string for {system, thread_id, message_id}
  sourceEventId: String  # External event ID for dedup
  bodyStoredAt: String
  createdAt: Timestamp! @default(expr: "request.time")
  updatedAt: Timestamp! @default(expr: "request.time")
}

# ============================================================================
# MEETINGS
# ============================================================================

type Meeting @table {
  id: UUID! @default(expr: "uuidV4()")
  workspace: Workspace!
  customer: Customer!
  need: Need  # The need this meeting addresses (nullable for ad hoc)
  title: String!
  type: String
  scheduledAt: Timestamp!
  durationMinutes: Int
  source: MeetingSource! @default(value: "manual")
  status: MeetingStatus @default(value: "scheduled")
  externalEventId: String
  recurringEventId: String  # For recurring calendar events
  linkStatus: MeetingLinkStatus @default(value: "pending")
  attendeesOurs: String  # JSON array
  attendeesTheirs: String  # JSON array
  deletedAt: Timestamp  # Soft delete
  createdAt: Timestamp! @default(expr: "request.time")
  updatedAt: Timestamp! @default(expr: "request.time")
}

type MeetingBrief @table {
  id: UUID! @default(expr: "uuidV4()")
  workspace: Workspace!
  meeting: Meeting!
  progressNarrative: String
  progressFacts: String  # JSON array
  friction: String
  talkingPoints: String  # JSON array
  valueDelivered: String
  riskToRenewal: String
  expansionSignals: String
  pricingContext: String
  followupEmail: String  # JSON object
  generatedAt: Timestamp! @default(expr: "request.time")
  model: String!
  promptVersion: String!
  inputsHash: String!
  handbookVersionId: UUID!
  createdAt: Timestamp! @default(expr: "request.time")
  updatedAt: Timestamp! @default(expr: "request.time")
}

# ============================================================================
# MILESTONES & COMMITMENTS
# ============================================================================

type Milestone @table {
  id: UUID! @default(expr: "uuidV4()")
  workspace: Workspace!
  customer: Customer!
  title: String!
  ownerLabel: String
  ownerSide: OwnerSide! @default(value: "joint")
  targetDate: Date
  status: MilestoneStatus! @default(value: "not_started")
  description: String
  blockedReason: String
  sortOrder: Int! @default(value: 0)
  adaptedFromPlaybookId: UUID
  # Goal-centric architecture: Link milestone to the goal it serves
  goal: Goal                    # FK to the goal this milestone advances (nullable for backwards compat)
  goalRationale: String         # Why this milestone helps achieve the goal
  createdAt: Timestamp! @default(expr: "request.time")
  updatedAt: Timestamp! @default(expr: "request.time")
}

type Commitment @table {
  id: UUID! @default(expr: "uuidV4()")
  workspace: Workspace!
  customer: Customer!
  side: CommitmentSide!
  text: String!
  dueLabel: String              # free-text label (e.g. "EOW") — kept for display
  dueDate: Date                 # real due date — enables measurable follow-through reliability
  deliveredAt: Timestamp        # when it was actually fulfilled (null = not yet delivered)
  status: CommitmentStatus! @default(value: "in_progress")
  sourceInteraction: Interaction
  sourceMeeting: Meeting
  # Goal-centric architecture: Stakes (The Ledger)
  stake: String                 # What's at risk if this commitment breaks ("Sarah's reputation")
  stakeHolder: Stakeholder      # FK to the person who bears the stake
  createdAt: Timestamp! @default(expr: "request.time")
  updatedAt: Timestamp! @default(expr: "request.time")
}

# ============================================================================
# SIGNALS
