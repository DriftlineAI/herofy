type RenewalRisk @table {
  id: UUID! @default(expr: "uuidV4()")
  workspace: Workspace!
  customer: Customer!
  riskLevel: RiskLevel!
  summary: String
  evidenceIds: String  # JSON array
  generatedAt: Timestamp! @default(expr: "request.time")
  handbookVersionId: UUID!
  createdAt: Timestamp! @default(expr: "request.time")
  updatedAt: Timestamp! @default(expr: "request.time")
}

# ============================================================================
# RENEWALS WORKSPACE
# Net-new, additive. Powers the Renewals pipeline list + adaptive workspace.
# A RenewalProfile is the per-customer companion that carries the posture,
# the contract facts shown in the right rail, and the expansion targets.
# RenewalPlay / RenewalRiskItem hang off the profile. Seed-written today;
# the orchestrator's risk_save play can write these later (see artifacts.py).
# ============================================================================

type RenewalProfile @table {
  id: UUID! @default(expr: "uuidV4()")
  workspace: Workspace!
  customer: Customer!                          # 1:1 companion (one current profile per customer)
  posture: RenewalPosture! @default(value: "hold")
  postureReason: String                        # short rationale for the posture (shown in hero Sidekick note)
  narrativeLede: String                        # the one-sentence thesis shown in list + hero
  targetArrCents: Int64                        # desired contract value at renewal (null = hold current)
  expansionPipeCents: Int64                    # potential upside amount (expand posture)
  # Contract facts for the right rail
  renewalType: String                          # display label: "Annual", "Expansion", "At risk", ...
  autoRenew: Boolean
  termNote: String                             # e.g. "Annual · opt-in" or "24-month goal"
  lastPriceChangeNote: String                  # e.g. "None · 2yr flat"
  # Provenance
  postureSetBy: String                         # "seed" | "agent:orchestrator" | "user:uid"
  postureDerivedAt: Timestamp
  createdAt: Timestamp! @default(expr: "request.time")
  updatedAt: Timestamp! @default(expr: "request.time")
}

# A strategic renewal play (defense or expansion). Distinct from RiskPlayStep
# (the orchestrator's save-play checklist): a play card has a $ amount, basis,
# and a posture badge.
type RenewalPlay @table {
  id: UUID! @default(expr: "uuidV4()")
  workspace: Workspace!
  customer: Customer!
  profile: RenewalProfile!
  kind: RenewalPlayKind!
  posture: RenewalPosture!                     # which posture this play appears under
  title: String!
  description: String!
  basis: String                                # evidence basis line (e.g. "12 WORKFLOWS × AVG 5.6 DAYS SAVED")
  valueAmountCents: Int64                       # $ this play protects or adds (nullable)
  valueLabel: String                           # display: "PROTECTS · $24K" or "ADDS · +$45K ARR"
  isPrimary: Boolean! @default(value: false)   # the lead play, rendered prominently
  sortOrder: Int! @default(value: 0)
  createdAt: Timestamp! @default(expr: "request.time")
  updatedAt: Timestamp! @default(expr: "request.time")
}

# A discrete risk-register item for the renewal workspace (title + severity +
# mitigation). Distinct from RenewalRisk (an AI one-liner) — these are the
# named risks shown in the "what could lose it" register.
type RenewalRiskItem @table {
  id: UUID! @default(expr: "uuidV4()")
  workspace: Workspace!
  customer: Customer!
  profile: RenewalProfile!
  title: String!
  description: String!
  severity: RiskLevel!                          # low | medium | high
  mitigation: String
  sortOrder: Int! @default(value: 0)
  createdAt: Timestamp! @default(expr: "request.time")
  updatedAt: Timestamp! @default(expr: "request.time")
}

# ============================================================================
# HANDOFFS (HITL)
# ============================================================================

type HandoffBrief @table {
  id: UUID! @default(expr: "uuidV4()")
  workspace: Workspace!
  customer: Customer  # NULL if customer not yet created
  capturedAt: Timestamp! @default(expr: "request.time")
  # Markdown body - the primary content written by the agent
  body: String  # Comprehensive markdown document with all handoff details
  # Timeline
  dayCurrent: Int
  dayTotal: Int
  # Legacy structured fields (for backwards compatibility, prefer body)
  salesCommitments: String  # JSON
  technicalContext: String  # JSON
  realityCheckConfidence: String
  realityCheckRisks: String
  status: HandoffStatus! @default(value: "draft")
  userCorrections: String  # JSON
  confirmedByUser: User
  confirmedAt: Timestamp
  notionDealId: String
  notionDealUrl: String
  handbookVersionId: UUID!
  model: String
  promptVersion: String
  createdAt: Timestamp! @default(expr: "request.time")
  updatedAt: Timestamp! @default(expr: "request.time")
}

type HandoffOpenQuestion @table {
  id: UUID! @default(expr: "uuidV4()")
  brief: HandoffBrief!
  text: String!
  resolved: Boolean! @default(value: false)
  createdAt: Timestamp! @default(expr: "request.time")
}

# Handoff questions with routing (side-asks, kickoff items)
# These are non-blocking questions that the agent records but doesn't pause for
type HandoffQuestion @table {
  id: UUID! @default(expr: "uuidV4()")
  workspace: Workspace!
  customer: Customer!
  agentRun: AgentRun
  # The question text
  question: String!
  # What data field this relates to (e.g., "success_metrics", "timeline")
  field: String
  # Routing: "sales" (side-ask for AE) or "kickoff" (kickoff agenda item)
  routing: String!
  # Structured question type: pick_one, pick_many, pick_person, slider, freeform, date, yes_no
  questionType: String @default(value: "freeform")
  # JSON metadata for question type (options, min/max, labels, etc.)
  metadata: String
  # Agent's proposed answer (for side-asks, makes confirmation easier)
  proposedAnswer: String
  # What aspect of the plan this affects
  relatesTo: String
  # Status: pending, answered, skipped
  status: String! @default(value: "pending")
  # The actual answer when provided
  answerText: String
  answeredAt: Timestamp
  answeredBy: User
  createdAt: Timestamp! @default(expr: "request.time")
}

# ============================================================================
# AI PLANS (HITL)
# ============================================================================

type AiPlan @table {
  id: UUID! @default(expr: "uuidV4()")
  workspace: Workspace!
  customer: Customer
  brief: HandoffBrief
  archetypeName: String
  milestoneCount: Int
  durationLabel: String
  rationale: String
  headline: String
  milestones: String  # JSON array of milestone objects
  status: ApprovalStatus! @default(value: "pending_approval")
  approvedByUser: User
  approvedAt: Timestamp
  rejectionReason: String
  regeneratedFromPlanId: UUID
  humanEdited: Boolean! @default(value: false)
  regenerationCount: Int! @default(value: 0)
  generatedAt: Timestamp! @default(expr: "request.time")
  model: String!
  promptVersion: String!
  inputsHash: String
  handbookVersion: HandbookVersion  # Optional audit trail
  createdAt: Timestamp! @default(expr: "request.time")
  updatedAt: Timestamp! @default(expr: "request.time")
}

# ============================================================================
# DRAFT RESPONSES (HITL)
# ============================================================================

type DraftResponse @table {
  id: UUID! @default(expr: "uuidV4()")
  workspace: Workspace!
  customer: Customer!
  thread: Thread
  subject: String
  body: String!
  # "Vector preview": JSON array of source attributions for spans of the draft —
  # [{quote, source_type: handbook|voice|past_interaction|signal, source_id, snippet}].
  # Populated once the vector/RAG grounding layer lands; UI renders highlights when present.
  citations: String
  status: DraftResponseStatus! @default(value: "pending_review")
  editedBody: String
  approvedByUser: User
  approvedAt: Timestamp
  sentAt: Timestamp
  autoSendAfter: Timestamp
  surfacedInNeed: Need
  generatedAt: Timestamp! @default(expr: "request.time")
  model: String!
  promptVersion: String!
  handbookVersionId: UUID!
  createdAt: Timestamp! @default(expr: "request.time")
  updatedAt: Timestamp! @default(expr: "request.time")
}

# ============================================================================
# HUDDLES — internal team discussion anchored to a conversation (and optionally a
# specific message). Isomorphic to Thread→Interaction: a Huddle has many
# HuddleMessages. `@sidekick` participation = an agent-authored HuddleMessage,
# posted by the orchestrator via a huddle_reply task.
# ============================================================================

type Huddle @table {
  id: UUID! @default(expr: "uuidV4()")
  workspace: Workspace!
  customer: Customer!
  thread: Thread!                         # the customer conversation this huddle lives on
  anchorInteraction: Interaction          # null = conversation-level; set = pinned to a message
  title: String
  status: HuddleStatus! @default(value: "open")
  createdByUser: User
  resolvedAt: Timestamp
  createdAt: Timestamp! @default(expr: "request.time")
  updatedAt: Timestamp! @default(expr: "request.time")
}

type HuddleMessage @table {
  id: UUID! @default(expr: "uuidV4()")
  huddle: Huddle!
  authorUser: User                        # null when authorKind = agent
  authorKind: String! @default(value: "user")  # "user" | "agent"
  body: String!
  mentions: String                        # JSON array of userIds and/or "sidekick"
  createdAt: Timestamp! @default(expr: "request.time")
}

# ============================================================================
# CAPTURED ITEMS
# ============================================================================

type CapturedItem @table {
  id: UUID! @default(expr: "uuidV4()")
  workspace: Workspace!
  customer: Customer!
  meeting: Meeting
  tag: String!  # commitment, goal, risk, followup, decision
  text: String!
  dueLabel: String
  published: Boolean! @default(value: false)
