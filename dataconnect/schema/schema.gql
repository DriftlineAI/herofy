# ============================================================================
# PLAYBOOKS - Global Catalog + Workspace Customization
# ============================================================================

# Reusable milestone blocks (global, institutional knowledge)
# These encode best practices: "SSO setup typically takes 5-7 days"
type MilestoneBlock @table {
  id: UUID! @default(expr: "uuidV4()")
  slug: String! @unique  # "sso-setup", "data-migration", "kickoff-call"
  name: String!
  description: String
  ownerSide: OwnerSide! @default(value: "joint")
  typicalDays: Int!  # Default duration
  minDays: Int       # Minimum reasonable duration
  maxDays: Int       # Maximum reasonable duration
  category: BlockCategory!
  prerequisites: String  # JSON array of block slugs that should come before
  tags: String           # JSON array: ["technical", "enterprise", "compliance"]
  isActive: Boolean! @default(value: true)
  sortOrder: Int! @default(value: 0)
  createdAt: Timestamp! @default(expr: "request.time")
  updatedAt: Timestamp! @default(expr: "request.time")
}

# Global playbook templates (catalog, accessible to all workspaces)
type PlaybookTemplate @table {
  id: UUID! @default(expr: "uuidV4()")
  slug: String! @unique  # "quick-start", "standard-saas", "enterprise"
  name: String!
  description: String
  complexity: PlaybookComplexity!
  estimatedDays: Int!
  fitCriteria: String    # JSON: conditions when AI should suggest this
  isActive: Boolean! @default(value: true)
  sortOrder: Int! @default(value: 0)
  createdAt: Timestamp! @default(expr: "request.time")
  updatedAt: Timestamp! @default(expr: "request.time")
}

# Links templates to blocks (composition)
type PlaybookTemplateBlock @table(key: ["template", "block"]) {
  template: PlaybookTemplate!
  block: MilestoneBlock!
  sortOrder: Int! @default(value: 0)
  durationOverride: Int    # Optional: override block's typicalDays
  isRequired: Boolean! @default(value: true)  # Can AI skip this block?
}

# Workspace-specific playbooks (customized from templates or created from scratch)
enum PlaybookScenario {
  onboarding   # new-customer onboarding plan (the existing default)
  renewal      # renewal-prep play
  risk         # risk/save play — adapted by the orchestrator's risk strategist
}

type Playbook @table {
  id: UUID! @default(expr: "uuidV4()")
  workspace: Workspace!
  name: String!
  archetype: String
  fitNote: String
  # Which CS scenario this playbook templates. Existing playbooks default to
  # onboarding so nothing changes; risk playbooks are picked up by the orchestrator.
  scenario: PlaybookScenario! @default(value: "onboarding")
  drawnFromCount: Int! @default(value: 0)
  # Link to catalog template if adopted
  adoptedFromTemplate: PlaybookTemplate
  # Learning metrics - AI uses these to prioritize
  timesUsed: Int! @default(value: 0)
  timesAccepted: Int! @default(value: 0)     # Accepted without major edits
  timesEdited: Int! @default(value: 0)       # Accepted with edits
  timesRejected: Int! @default(value: 0)
  lastUsedAt: Timestamp
  createdAt: Timestamp! @default(expr: "request.time")
  updatedAt: Timestamp! @default(expr: "request.time")
}

type PlaybookMilestone @table {
  id: UUID! @default(expr: "uuidV4()")
  playbook: Playbook!
  title: String!
  ownerSide: OwnerSide! @default(value: "joint")
  durationDays: Int
  description: String
  sortOrder: Int! @default(value: 0)
  # Link to source block if composed from catalog
  sourceBlock: MilestoneBlock
  createdAt: Timestamp! @default(expr: "request.time")
}

# Track edits users make to playbooks (for learning patterns)
type PlaybookEdit @table {
  id: UUID! @default(expr: "uuidV4()")
  playbook: Playbook!
  workspace: Workspace!
  editType: PlaybookEditType!
  milestoneName: String        # Which milestone was edited
  originalValue: String        # JSON: what it was before
  newValue: String             # JSON: what it became
  editedByUser: User
  createdAt: Timestamp! @default(expr: "request.time")
}

# ============================================================================
# AGENT STATE & RUNS
# ============================================================================

type AgentState @table(key: ["workspace", "key"]) {
  workspace: Workspace!
  key: String!  # gmail_watermark, slack_watermark, etc.
  value: String
  updatedAt: Timestamp! @default(expr: "request.time")
}

type AgentRun @table {
  id: UUID! @default(expr: "uuidV4()")
  workspace: Workspace!
  agentName: String!
  status: AgentStatus! @default(value: "initialized")
  triggerType: String
  triggeredBy: String
  inputParams: String! @default(value: "{}")  # JSON
  currentStep: String
  contextSnapshot: String  # JSON
  confidenceLevel: ConfidenceLevel
  confidenceScore: Float
  confidenceReasons: String  # JSON array
  pausedAt: Timestamp
  pauseReason: String
  blockingNeed: Need
  clarifyingQuestions: String  # JSON
  resumedAt: Timestamp
  resumeAnswers: String  # JSON
  customer: Customer
  brief: HandoffBrief
  plan: AiPlan
  result: String  # JSON
  errorMessage: String
  usedFallback: Boolean @default(value: false)
  fallbackReason: String
  startedAt: Timestamp
  completedAt: Timestamp
  durationMs: Int
  createdAt: Timestamp! @default(expr: "request.time")
  updatedAt: Timestamp! @default(expr: "request.time")
}

# Orchestrator work queue (net-new). Decouples *what triggers work* from *what
# does work*; durable, retryable, restart-safe HITL. Owned by the orchestrator
# module — handoff_auto does not use this table.
type AgentTask @table {
  id: UUID! @default(expr: "uuidV4()")
  workspace: Workspace!
  customer: Customer                                    # null for workspace-level tasks
  taskType: String!                                     # triage_signal | reflect_account | renewal_check | follow_up | ...
  triggerType: String! @default(value: "demo")          # demo | signal | schedule | play | user
  payload: String! @default(value: "{}")                # JSON — the event/context that produced the task
  status: AgentTaskStatus! @default(value: "pending")
  priority: Int! @default(value: 100)                   # lower = higher priority
  scheduledFor: Timestamp! @default(expr: "request.time")  # earliest claim time (enables self-scheduled follow-ups)
  attempts: Int! @default(value: 0)
  blockingNeed: Need                                    # set when paused for HITL
  agentRun: AgentRun                                    # the run that processed this task (progress streaming)
  result: String                                        # JSON outcome
  errorMessage: String
  claimedAt: Timestamp
  completedAt: Timestamp
  createdAt: Timestamp! @default(expr: "request.time")
  updatedAt: Timestamp! @default(expr: "request.time")
}

