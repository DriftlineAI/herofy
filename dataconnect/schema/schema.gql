type Signal @table {
  id: UUID! @default(expr: "uuidV4()")
  workspace: Workspace!
  customer: Customer!
  kind: SignalKind!
  state: SignalState!
  sentence: String
  evidenceText: String
  nextAction: String
  supersededAt: Timestamp
  generatedAt: Timestamp! @default(expr: "request.time")
  model: String!
  promptVersion: String!
  inputsHash: String!
  handbookVersionId: UUID!
  createdAt: Timestamp! @default(expr: "request.time")
  updatedAt: Timestamp! @default(expr: "request.time")
}

# ============================================================================
# RISK MANAGEMENT
# ============================================================================

type RiskBrief @table {
  id: UUID! @default(expr: "uuidV4()")
  workspace: Workspace!
  customer: Customer!
  whatChanged: String
  evidenceText: String
  play: String
  generatedAt: Timestamp! @default(expr: "request.time")
  model: String!
  promptVersion: String!
  inputsHash: String!
  handbookVersionId: UUID!
  createdAt: Timestamp! @default(expr: "request.time")
  updatedAt: Timestamp! @default(expr: "request.time")
}

type RiskPlayStep @table {
  id: UUID! @default(expr: "uuidV4()")
  brief: RiskBrief!
  label: String!
  rationale: String
  done: Boolean! @default(value: false)
  # Optional CSM findings when a step is worked (e.g. what the deep dive turned up). Captured
