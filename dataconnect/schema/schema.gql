# ============================================================================
# METRIC SNAPSHOTS (time-series substrate — see docs/plans/SIGNAL_AGGREGATION.md)
# Append-only log of every tracked score/state change. Never overwritten.
# Append-on-change is primary; the sweep adds a daily heartbeat row per metric.
# Plain @table (UUID PK, no composite key): MANY rows per customer/metric/day.
# metric  (String catalog, not enum so it can grow without schema edits):
#   health_score | engagement | sentiment | engagement_health | vector_<category>
# trigger (String catalog):
#   scheduled_daily | risk_signal | commitment_change | play_completed |
#   manual_override | inbound | sweep | assessment
# ============================================================================

type MetricSnapshot @table {
  id: UUID! @default(expr: "uuidV4()")
  workspace: Workspace!
  customer: Customer!
  stakeholder: Stakeholder       # null = account-level (FK present; populated in a later phase)
  metric: String!                # catalog key — see comment above
  value: Float                   # numeric value where it applies (null for state-only metrics)
  state: String                  # "ok" | "warn" | "risk" where it applies (null for numeric-only)
  prevValue: Float               # prior numeric value (null when no prior snapshot exists)
  trigger: String!               # what caused this append — see comment above
  inputs: String!                # JSON — contributing factors behind this value (explainability)
  capturedAt: Timestamp! @default(expr: "request.time")
  createdAt: Timestamp! @default(expr: "request.time")
}

# ============================================================================
# WAITLIST
# ============================================================================

type WaitlistSignup @table {
  id: UUID! @default(expr: "uuidV4()")
  email: String! @unique
  source: String  # Where they signed up from
  signedUpAt: Timestamp! @default(expr: "request.time")
}
