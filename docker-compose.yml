version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: herofy-db
    environment:
      POSTGRES_DB: herofy_dev
      POSTGRES_USER: herofy
      POSTGRES_PASSWORD: herofy_local
    ports:
      - "5432:5432"
    volumes:
      - herofy_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U herofy -d herofy_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  herofy_pgdata:
